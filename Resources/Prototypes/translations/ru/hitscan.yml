# #Misfits Add - Yellow beam for Wattz 2000/3000 focused laser rifles.
# Uses red beam sprites tinted bright yellow. Base damage matches Red;
# actual output is higher due to GunDamageBonusComponent on the Wattz weapons.
# Wider beam (1.5x) simulates focused optics — Assaultron is 3.0 for comparison.
- type: hitscan
  id: N14MFLaserYellow
  damage:
    types:
      Heat: 17
  tintColor: "#FFD700"
  beamWidth: 1.5
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_laser
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_laser

