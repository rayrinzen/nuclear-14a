- type: alarmThreshold
  id: stationTemperature
  upperBound: !type
    threshold: 393.15 # T20C + 200
  lowerBound: !type
    threshold: 193.15 # T20C - 100
  upperWarnAround: !type
    threshold: 0.8
  lowerWarnAround: !type
    threshold: 1.1
- type: alarmThreshold
  id: stationPressure
  upperBound: !type
    threshold: 550 # HazardHighPressure from Atmospherics.cs
  lowerBound: !type
    # Actual low pressure damage threshold is at 20 kPa, but below ~85 kPa you can't breathe due to lack of oxygen.
    threshold: 20
  upperWarnAround: !type
    threshold: 0.7 # 385 kPa, WarningHighPressure from Atmospherics.cs
  lowerWarnAround: !type
    threshold: 4.5 # ~90 kPa
- # a reminder that all of these are percentages (where 1 is 100%),
# so 0.01 is 1%,
# 0.0001 is 0.01%
# etc.
type: alarmThreshold
  id: stationOxygen
  lowerBound: !type
    threshold: 0.10
  lowerWarnAround: !type
    threshold: 1.5
- type: alarmThreshold
  id: stationCO2
  upperBound: !type
    threshold: 0.006
  upperWarnAround: !type
    threshold: 0.5 # minor gasping and airloss at 0.3%
- type: alarmThreshold
  id: stationPlasma
  upperBound: !type
    threshold: 0.005 # lightable beyond this concentration
  upperWarnAround: !type
    threshold: 0.5
- type: alarmThreshold
  id: stationTritium
  upperBound: !type
    threshold: 0.004 # lightable beyond this concentration
  upperWarnAround: !type
    threshold: 0.5
- type: alarmThreshold
  id: stationWaterVapor
  upperBound: !type
    threshold: 1.5
  upperWarnAround: !type
    threshold: 0.5
- type: alarmThreshold
  id: stationNO
  upperBound: !type
    threshold: 0.01
  upperWarnAround: !type
    threshold: 0.5
- type: alarmThreshold
  id: stationAmmonia
  upperBound: !type
    threshold: 0.05
  upperWarnAround: !type
    threshold: 0.5
- type: alarmThreshold
  id: ignore # just ignore nitrogen??? ??? ???
  ignore: true
- type: alarmThreshold
  id: danger #just any gas you don't want at all
  upperBound: !type
    threshold: 0.0001
- type: alarmThreshold
  id: voxOxygen
  upperBound: !type
    threshold: 0.02 # 2%
  upperWarnAround: !type
    threshold: 0.5 # 1%
- type: alarmThreshold
  id: voxNitrogen
  lowerBound: !type
    threshold: 0.8 # danger below 80% nitrogen
  lowerWarnAround: !type
    threshold: 1.125 # warning below 90%
