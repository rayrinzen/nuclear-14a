- # C-27 humanoid robot body parts. #Misfits Add
# Inorganic damage container — no Toxin/Airloss/Genetic; just Brute + Burn (Heat/Shock).
# This makes them naturally immune to oxy/tox/rad damage at the part level (Phase F also
# layers explicit damage modifiers on the mob entity itself).
type: entity
  id: MisfitsPartC27
  parent:
  - BaseItem
  - BasePart
  name: "c-27 chassis part"
  abstract: true
  components:
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic # standard metallic resists; tweaked via mob-level modifier in Phase F
  - type: BodyPart
    severIntegrity: 150
    integrityThresholds:
      CriticallyWounded: 150
      HeavilyWounded: 120
      ModeratelyWounded: 90
      SomewhatWounded: 60
      LightlyWounded: 30
      Healthy: 15
  - type: ContainerContainer
    containers:
      bodypart: !type
        ents: [ ]
  - type: StaticPrice
    price: 0
- # No Extractable — robotic chassis pieces don't yield biological reagents.
type: entity
  id: MisfitsTorsoC27
  name: "c-27 torso"
  parent:
  - MisfitsPartC27
  - BaseTorso
  components:
