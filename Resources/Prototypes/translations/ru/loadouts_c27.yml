# C-27 Humanoid Robot loadout entries. #Misfits Add (Phase H)
# #Misfits Removed - Phase H revised: C-27 species uses restrictedCustomization which hides the
# lobby Loadouts tab, so these type:loadout entries never appear to the player. Armor delivery is
# now handled via UndecidedLoadoutBackpack kit items in startingGear (see c27_loadout_kits.yml).
# Entries kept below for reference — do not delete per project policy.
#
# Job-restricted character-creation loadout choices for the C27 job. Players who selected
# the C27 species + C27 job in the lobby see these entries and can pick which factory paint
# (Generic / NCR / BoS) and which weight class (Light / Medium / Heavy) of outer armor and
# helmet they want to spawn with. The base chassis jumpsuit (ClothingC27Chassis) is already
# auto-equipped via the C27Gear startingGear (Phase G), so no loadout is needed for it.
#
# Pattern mirrors LoadoutEnclavePin* / LoadoutNCRPin* in this fork: category Roles,
# cost 1, exclusive true, single-item, gated by CharacterJobRequirement: C27.
# Items use the Phase E entities; the C27Wearable tag on each lets them slot into the
# C-27 inventory template's outerClothing whitelist (Phase B).

null

