# Jet
type: constructionGraph
  id: N14JetInhaler
  start: start
  graph:
    - node: start
      edges:
        - to: jet
          steps:
          - material: Plastic
    - node: jet
      entity: N14JetInhaler
- # Hydra
type: constructionGraph
  id: N14Hydra
  start: start
  graph:
    - node: start
      edges:
        - to: hydra
          conditions:
            - !type 
              solution: pen
              reagent:
                ReagentId: Hydra
              quantity: 15
          steps:
            -             #Misfits Change /Tweak/: Refill the empty hydra rig after mixing Hydra in chemistry.
tool: Screwing
              doAfter: 1
    - node: hydra
      entity: N14Hydra
- # Dirty Gauze
type: constructionGraph
  id: N14DirtyGauze1
  start: start
  graph:
    - node: start
      edges:
        - to: n14dgauze
          steps:
          - material: Cloth
            amount: 2
            doAfter: 4
    - node: n14dgauze
      entity: N14DirtyGauze1
- # Healing Poultice
type: constructionGraph
  id: N14HealingPoultice
  start: start
  graph:
    - node: start
      edges:
        - to: healing poultice
          steps:
            - material: BrocFlower
            - material: XanderRoot
            - material: CaveFungus
            - material: AgaveLeaf
    - node: healing poultice
      entity: N14HealingPoultice
