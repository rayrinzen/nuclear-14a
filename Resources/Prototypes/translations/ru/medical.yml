- # Mortar and pestle
type: constructionGraph
  id: N14MortarPestle
  start: start
  graph:
    - node: start
      edges:
        - to: mortarpestle
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 5
    - node: mortarpestle
      entity: N14MortarpestleGrinder
- # Healing Powder
type: constructionGraph
  id: N14HealingPowder
  start: start
  graph:
    - node: start
      edges:
        - to: healingpowder
          steps:
            - material: BrocFlower
            - material: XanderRoot
    - node: healingpowder
      entity: N14HealingPowder
- # Cleansing Powder
type: constructionGraph
  id: N14CleansingPowder
  start: start
  graph:
    - node: start
      edges:
        - to: cleansingpowder
          steps:
            - material: CaveFungusRad
            - material: XanderRoot
    - node: cleansingpowder
      entity: N14CleansingPowder
- # Stimpaks
type: constructionGraph
  id: N14Stimpak
  start: start
  graph:
    - node: start
      edges:
        - to: stimpak
          steps:
          - material: BrocFlower
          - material: XanderRoot
          - tag: N14EmptySyringe
            name: empty syringe
            icon:
              sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
              state: stimpak-empty # Forge-Change
            doAfter: 1
          - material: Bloodpack
            doAfter: 1
    - node: stimpak
      entity: N14Stimpak
- # Bitterdrink
type: constructionGraph
  id: N14Bitterdrink
  start: start
  graph:
    - node: start
      edges:
        - to: bitterdrink
          steps:
            - material: BrocFlower
            - material: XanderRoot
            - tag: N14EmptyNukaBottle
              name: empty Nuka-Cola bottle
              icon:
                sprite: _Nuclear14/Objects/Consumable/Drinks/nuka_cola_new.rsi
                state: empty
              doAfter: 1
    - node: bitterdrink
      entity: N14Bitterdrink
- # RadAway Inhaler
type: constructionGraph
  id: N14RadAwayInhaler
  start: start
  graph:
  - node: start
    edges:
    - to: empty
      steps:
        - tag: Jet
          name: jet
          icon:
            sprite: _Nuclear14/Objects/Specific/Medical/drugs.rsi
            state: jet
  - node: empty
    entity: N14RadAwayInhalerTrash
    edges:
    - to: refill
      steps:
        - tag: Phial
          name: RadAway Phial
          icon:
            sprite: _Nuclear14/Objects/Specific/Medical/radinhaler.rsi
            state: radawayphial_icon
          doAfter: 2
  - node: refill
    entity: N14RadAwayInhaler
    edges:
    - to: empty
      steps:
      - tool: Screwing
        doAfter: 2
- # RadAway Phial
type: constructionGraph
  id: N14RadAwayPhial
  start: start
  graph:
  - node: start
    edges:
    - to: fill
      conditions:
      - !type 
        solution: beaker
        reagent:
          ReagentId: RadAway
        quantity: 30
      steps:
      - tool: Screwing
        doAfter: 1
  - node: fill
    entity: N14RadAwayPhial
