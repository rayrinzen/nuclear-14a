- type: constructionGraph
  id: Grille
  start: start
  graph:
    - node: start
      edges:
        - to: grille
          completed:
            - !type 
              southRotation: true
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
    - node: grille
      entity: Grille
      edges:
        - to: start
          completed:
            - !type 
              message: "A grille was cut"
            - !type 
              prototype: PartRodMetal1
              amount: 2
            - !type :DeleteEntity
          steps:
            - tool: Cutting
              doAfter: 1
    - node: grilleBroken
      entity: GrilleBroken
      edges:
        - to: start
          completed:
            - !type 
              prototype: PartRodMetal1
              amount: 1
            - !type :DeleteEntity
          steps:
            - tool: Cutting
        - to: grille
          steps:
            - material: MetalRod
              amount: 1
              doAfter: 1
