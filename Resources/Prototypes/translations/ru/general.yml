- type: entity
  name: cardboard box
  parent: BoxBase
  id: N14BoxPlastic
  description: An old plastic box for storing things.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Misc/storage.rsi
      state: box
    # #Misfits Fix - Add the same cleanup timer used on other disposable wasteland clutter, but pause it while the box sits in storage.
    - type: TimedDespawn
      lifetime: 300
    - type: PauseTimedDespawnInEntityStorage

- type: entity
  name: wastelander box
  parent: N14BoxPlastic
  id: N14BoxPlasticFilledWastelander
  components:
    - type: StorageFill
      contents:
        - id: Flare
          amount: 3
        - id: N14RadXPill
          amount: 1
        - id: N14CleanGauze10
          amount: 1

- type: entity
  name: military box
  parent: N14BoxPlastic
  id: N14BoxPlasticFilledMilitary
  components:
    - type: StorageFill
      contents:
        - id: N14Stimpak
          prob: 0.7
          orGroup: RandomMed
        - id: N14ChemicalSyringeAntidote
          prob: 0.2
          orGroup: RandomMed
        - id: N14SuperStimpak
          prob: 0.1
          orGroup: RandomMed
        - id: N14CleanGauze10
          amount: 1
        - id: N14RadXPill
          amount: 1
        # Misfits Change: Removed bottlecap entry — caps should not be granted via starting gear boxes.
        #- id: N14CurrencyCap
        #  amount: 0
        #  maxAmount: 100
        #  prob: 0.5
        #  orGroup: Currency
        - id: Flare
          amount: 2

- type: entity
  name: military box
  parent: N14BoxPlastic
  id: N14BoxPlasticFilledMilitaryNCR
  components:
    - type: StorageFill
      contents:
        - id: N14Stimpak
          prob: 0.7
          orGroup: RandomMed
        - id: N14ChemicalSyringeAntidote
          prob: 0.2
          orGroup: RandomMed
        - id: N14SuperStimpak
          prob: 0.1
          orGroup: RandomMed
        - id: N14CleanGauze10
          amount: 1
