- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: N14Bullet50
  name: bullet (.50 AP anti-materiel)
  components:
    - type: Projectile
      damage:
        types:
          Piercing: 30
          Blunt: 20
      ignoreResistances: true
    # Misfits Add - .50 BMG anti-materiel; extreme range caliber — minimal falloff
    - type: BallisticDamageFalloff
      falloffStartTiles: 12.0
      maxFalloffTiles: 35.0
      minDamageMultiplier: 0.82

- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseGrenadeProjectile
  id: N14Bullet50HEIAP
  name: bullet (.50 HEIAP anti-materiel)
  components:
    - type: IgniteOnCollide
      fireStacks: 1
    - type: Projectile
      damage:
        types:
          Piercing: 40 # medium decrease for explosion numerics
      ignoreResistances: true
    # Misfits Add - .50 HEIAP; same caliber as AP, same minimal falloff on direct hit damage
    - type: BallisticDamageFalloff
      falloffStartTiles: 12.0
      maxFalloffTiles: 35.0
      minDamageMultiplier: 0.82
    - type: ExplodeOnTrigger
    - type: Explosive
      #Misfits Change - use the structural-capable N14 explosion profile.
      explosionType: N14DefaultStructural
      maxIntensity: 1
      intensitySlope: 6
      totalIntensity: 3
      maxTileBreak: 0
