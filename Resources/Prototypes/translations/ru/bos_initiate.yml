#Misfits Change /Add/: New consolidated Brotherhood Initiate job.
type: job
  id: BoSInitiate
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true
  weight: 10
  showBorder: true
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-initiate
  description: job-description-bos-initiate
  playTimeTracker: BoSInitiate
  requirements:
    - !type 
      species:
        - Human
  #- !type:CharacterOverallTimeRequirement # TEMP REMOVED
  #  min: 0
  startingGear: BoSInitiateGear
  alwaysUseSpawner: true
  icon: "JobIconBosMSquire"
  supervisors: job-supervisors-bos-initiate
  accessGroups:
  - BOSInitiate
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
- type: startingGear
  id: BoSInitiateGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsLeatherFilled
    pocket1: BoSBrotherhoodInitiateKits
    id: N14IDBrotherhoodOfSteelHolotagInitiate
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: ClothingBeltMilitary
  storage:
    back:
    - N14BoxPlasticFilledMilitary
- type: playTimeTracker
  id: BoSInitiate
