# Inert prop shims for removed decorative map pieces.
- type: entity
  id: CMIV
  parent: MisfitsMapCompatDecoration
  name: IV drip
  description: A basic intravenous drip stand.
  components:
    - type: Sprite
      sprite: Objects/Misc/Lights/lampint.rsi
      state: lamp-int

- type: entity
  id: CMOverheadPipe
  parent: MisfitsMapCompatDecoration
  name: overhead pipe
  description: A fixed utility pipe.
  components:
    - type: Sprite
      sprite: Structures/Piping/Atmospherics/pipe.rsi
      drawdepth: ThinPipe
      state: pipeStraight

- type: entity
  id: RMCDeskFanTan
  parent: MisfitsMapCompatDecoration
  name: desk fan
  description: A small desk fan.
  components:
    - type: Sprite
      sprite: Structures/Piping/Atmospherics/tinyfan.rsi
      state: icon

