# Wendover still references a number of removed CM/RMC map props.
# These compatibility shims preserve map deserialization without reviving the full old content stack.

- type: entity
  id: MisfitsMapCompatDecoration
  abstract: true
  parent: BaseStructure
  components:
    - type: Transform
      anchored: true
    - type: Physics
      canCollide: false
      bodyType: Static

# Direct compatibility aliases to surviving live content.
- type: entity
  id: CMDispenserSoda
