# #Misfits Add - Nightkin base mob entity.
# Inherits all stats/body/inventory from N14BaseMobSuperMutant.
# Overrides species to Nightkin and icon to use nightkin full sprite.

- type: entity
  save: false
  name: nightkin
  id: N14BaseMobNightkin
  parent: N14BaseMobSuperMutant
  categories: [ HideSpawnMenu ]
  components:
    - type: HumanoidAppearance
      species: Nightkin
    - type: Icon
      sprite: _Misfits/Mobs/Species/Nightkin/parts.rsi
      state: full
    # #Misfits Add - Innate Stealth Boy implant: toggle-able cloak with hallucination side effects.
    - type: NightkinPassiveStealth
    # #Misfits Tweak - Nightkin are tougher than standard supermutants (200 crit / 400 dead).
    - type: MobThresholds
      thresholds:
        0: Alive
        400: Critical
        600: Dead
    # Scale healCap to 90% of dead threshold (540 = 90% of 600).
    - type: RadiationHealing
      healCap: 540

# Character-creation preview dummy for Nightkin.
# Parents MobHumanDummy (not the base mob) to match the supermutant dummy pattern.
- type: entity
  save: false
  parent: MobHumanDummy
  id: N14MobNightkinDummy
  categories: [ HideSpawnMenu ]
  components:
    - type: HumanoidAppearance
      species: Nightkin
    - type: Icon
      sprite: _Misfits/Mobs/Species/Nightkin/parts.rsi
      state: full
    - type: Sprite
      drawdepth: Mobs
      noRot: true
      layers:
        - map: [ "enum.HumanoidVisualLayers.Chest" ]
        - map: [ "enum.HumanoidVisualLayers.Head" ]
        - map: [ "enum.HumanoidVisualLayers.Snout" ]
        - map: [ "enum.HumanoidVisualLayers.RArm" ]
        - map: [ "enum.HumanoidVisualLayers.LArm" ]
        - map: [ "enum.HumanoidVisualLayers.RLeg" ]
        - map: [ "enum.HumanoidVisualLayers.LLeg" ]
        - shader: StencilClear
          sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
          state: l_leg
        - shader: StencilMask
          map: [ "enum.HumanoidVisualLayers.StencilMask" ]
          sprite: Mobs/Customization/masking_helpers.rsi
          state: female_full
          visible: false
        - map: [ "jumpsuit" ]
        - map: [ "enum.HumanoidVisualLayers.LHand" ]
        - map: [ "enum.HumanoidVisualLayers.RHand" ]
        - map: [ "enum.HumanoidVisualLayers.LFoot" ]
        - map: [ "enum.HumanoidVisualLayers.RFoot" ]
        - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
