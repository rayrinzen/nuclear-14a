# Kill - execute an enemy commander in the name of Caesar
- type: entity
  categories: [ HideSpawnMenu ]
  parent: [ BaseLegionObjective, BaseKillObjective ]
  id: KillLegionHeadObjective
  description: Caesar has declared this target an enemy of the Legion. Their continued existence is an affront to Rome's order. Bring them to heel — or bring us their head. Ave, true to Caesar.
  components:
    - type: Objective
      difficulty: 3.0
      unique: true # one kill is enough to prove loyalty
    - type: TargetObjective
      title: objective-condition-kill-head-title
    - type: PickRandomEnemyHead # #Misfits Change /Fix/ - never target same-faction members
    - type: KillPersonCondition
      requireDead: true # must confirm the kill — the Legion does not leave enemies breathing

# Steal - seize NCR military intelligence holotape
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseLegionStealObjective
  id: LegionStealNCRObjective
  description: The NCR's patrols have been encroaching on Legion territory and our frumentarii have tracked a holotape containing their tactical plans. Recover it and deliver it to Legion command so Caesar may exploit their weaknesses.
  components:
    - type: StealCondition
      stealGroup: FactionPlansNCR
      owner: objective-condition-steal-ncr

# Steal - capture Brotherhood orders holotape
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseLegionStealObjective
  id: LegionStealBOSWObjective
  description: The Brotherhood of Steel sits atop mountains of pre-war weapons that rightfully belong to Caesar's forces. Our frumentarii have located a holotape detailing their orders and armoury locations. Take it.
  components:
    - type: StealCondition
      stealGroup: FactionPlansBOSW
      owner: objective-condition-steal-brotherhood

# Steal - acquire Enclave technological data holotape
# #Misfits Change - New Legion objective: seize Enclave weapons research
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseLegionStealObjective
  id: LegionStealEnclaveObjective
  description: Enclave remnants carry data-slates and holotapes documenting pre-war weapons research of immense value. Caesar's engineers want that knowledge. Our frumentarii have located one such holotape — claim it for the Legion.
  components:
    - type: StealCondition
      stealGroup: FactionPlansEnclave
      owner: objective-condition-steal-enclave

