- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseLegionObjective
  components:
    - type: Objective
      issuer: caesarlegion
    - type: FactionRequirement
      factions:
        - CaesarLegion

- type: entity
  abstract: true
  parent: [ BaseLegionObjective, BaseStealObjective ]
  id: BaseLegionStealObjective
  components:
    - type: StealCondition
      verifyMapExistence: false
    - type: Objective
      difficulty: 2.75
