# #Misfits Change /Fix/ - PickRandomEnemyHead replaces PickRandomHead; it excludes same-faction members from being selected as kill targets.
# #Misfits Change - Split into faction-specific objective pools so N14RuleSystem can route to the
# correct pool and eliminate mismatched-requirement warnings.
#
# GetRandomObjective() requires EXACTLY TWO LEVELS:
#   Level 1 (top arg)  → picks a group name  (must be a WeightedRandomPrototype)
#   Level 2 (group)    → picks an entity prototype ID
#
# Pattern:
#   XObjectives (used as GetRandomObjective arg) → XRealObjectives (sole level-1 entry)
#   XRealObjectives                              → KillXHeadObjective, XStealY, ... (entity IDs)

# #Misfits Tweak - Faction kill/steal objective pools disabled.
#                  N14RuleSystem now gives every player only the SurviveObjective.
#                  Kill/steal objectives were removed for being low-RP and encouraging griefing.
# ── Master fallback pool (non-faction players) ──────────────────────────────────────
# N14Objectives is the top-level arg, so it maps to the three "Real" pools which
# are themselves WeightedRandomPrototypes containing entity IDs. ✓
#- type: weightedRandom
#  id: N14Objectives
#  weights:
#    NCRRealObjectives: 1
#    BOSWRealObjectives: 1
#    LegionRealObjectives: 1
# ── Per-faction wrapper pools (passed directly as GetRandomObjective arg from N14RuleSystem) ──
# Each wrapper has ONE entry pointing to its RealObjectives pool, satisfying the two-level contract.
# NCR wrapper → NCRRealObjectives
#- type: weightedRandom
#  id: NCRObjectives
#  weights:
#    NCRRealObjectives: 1
# NCR actual entity-prototype pool (level 2)
#- type: weightedRandom
#  id: NCRRealObjectives
#  weights:
#    KillNCRHeadObjective: 1
#    NCRStealObjective: 1
#    NCRStealBOSWObjective: 1
#    NCRStealLegionObjective: 1 # #Misfits Change - steal Legion orders holotape
# Brotherhood of Steel wrapper → BOSWRealObjectives
#- type: weightedRandom
#  id: BOSWObjectives
#  weights:
#    BOSWRealObjectives: 1
# BOSW actual entity-prototype pool (level 2)
#- type: weightedRandom
#  id: BOSWRealObjectives
#  weights:
#    KillBOSWHeadObjective: 1
#    BOSWStealObjective: 1
#    BOSWStealNCRObjective: 1
#    BOSWStealLegionObjective: 1 # #Misfits Change - steal Legion battle orders holotape
# Caesar's Legion wrapper → LegionRealObjectives
# #Misfits Change - New Legion objective pool
#- type: weightedRandom
#  id: LegionObjectives
#  weights:
#    LegionRealObjectives: 1
# Legion actual entity-prototype pool (level 2)
#- type: weightedRandom
#  id: LegionRealObjectives
#  weights:
#    KillLegionHeadObjective: 1
#    LegionStealNCRObjective: 1
#    LegionStealBOSWObjective: 1
#    LegionStealEnclaveObjective: 1 # #Misfits Change - steal Enclave technological data
# ----------------------------------------
# NCR
# ----------------------------------------
# #Misfits Tweak - All faction kill/steal entity prototypes below are preserved for history
#                  but are unreachable: their hosting pools are commented out above and
#                  N14RuleSystem no longer routes any player to these objectives.
- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseNCRObjective
  components:
    - type: Objective
      issuer: ncr
    - type: FactionRequirement
      factions:
        - NCR

- type: entity
  abstract: true
  parent: [ BaseNCRObjective, BaseStealObjective ]
  id: BaseNCRStealObjective
  components:
    - type: StealCondition
      verifyMapExistence: false
    - type: Objective
      difficulty: 2.75
    - type: ObjectiveLimit
      limit: 2 # there is usually only 1 of each steal objective, have 2 max for drama

# Kill - terminate an enemy high-value target
- type: entity
  categories: [ HideSpawnMenu ]
  parent: [ BaseNCRObjective, BaseKillObjective ]
  id: KillNCRHeadObjective
  # #Misfits Change - Improved lore-based description for NCR kill objective
  description: Command has identified a high-value target operating in the field. Their continued activity poses a direct threat to NCR interests. Track them down and ensure they never report back.
  components:
    - type: Objective
      difficulty: 3.0
      unique: true # killing 1 head is enough
    - type: TargetObjective
      title: objective-condition-kill-head-title
    - type: PickRandomEnemyHead # #Misfits Change /Fix/ - never target same-faction members
    - type: KillPersonCondition
      requireDead: true # don't count missing evac as killing — heads are higher profile, must confirm the kill

# Steal - recover Enclave intelligence holotape
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseNCRStealObjective
  id: NCRStealObjective
  # #Misfits Change - Enclave plans holotape: NCR needs Enclave tech/movement intelligence
  description: Enclave remnants have been operating in the wastes and command wants to know their plans. Locate and secure their intelligence holotape before it falls into the wrong hands.
  components:
    - type: StealCondition
      stealGroup: FactionPlansEnclave
      owner: objective-condition-steal-enclave

# Steal - recover Brotherhood of Steel tactical plans holotape
# #Misfits Change - New NCR objective: steal Brotherhood operational plans
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseNCRStealObjective
  id: NCRStealBOSWObjective
  description: The Brotherhood has been moving against NCR positions. Command needs their operational plans to anticipate their next move. Acquire the Brotherhood's plans holotape and get it to a safe location.
  components:
    - type: StealCondition
      stealGroup: FactionPlansBOSW
      owner: objective-condition-steal-brotherhood

