# Brotherhood of Steel - Washington Chapter
# ----------------------------------------
- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseBOSWObjective
  components:
    - type: Objective
      issuer: brotherhoodofsteel #Misfits Change
    - type: FactionRequirement
      factions:
        - BrotherhoodOfSteel

- type: entity
  abstract: true
  parent: [ BaseBOSWObjective, BaseStealObjective ]
  id: BaseBOSWStealObjective
  components:
    - type: StealCondition
      verifyMapExistence: false
    - type: Objective
      difficulty: 2.75
    - type: ObjectiveLimit
      limit: 2 # there is usually only 1 of each steal objective, have 2 max for drama

# Kill - purge a high-value NCR officer or enemy combatant
- type: entity
  categories: [ HideSpawnMenu ]
  parent: [ BaseBOSWObjective, BaseKillObjective ]
  id: KillBOSWHeadObjective
  # #Misfits Change - Improved lore-based description for Brotherhood kill objective
  description: The Elders have marked a high-ranking enemy officer for termination. This individual has been actively disrupting Brotherhood operations and pillaging pre-war technology. Purge them. Ad Victoriam.
  components:
    - type: Objective
      difficulty: 3.0
      unique: true # killing 1 head is enough
    - type: TargetObjective
      title: objective-condition-kill-head-title
    - type: PickRandomEnemyHead # #Misfits Change /Fix/ - never target same-faction members
    - type: KillPersonCondition
      requireDead: true # don't count missing evac as killing — heads are higher profile, must confirm the kill

# Steal - recover a GECK location holotape (pre-war vault technology)
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBOSWStealObjective
  id: BOSWStealObjective
  # #Misfits Change - GECK holotape: Brotherhood seeks pre-war technology above all else
  description: Our scouts have located a holotape containing the coordinates of a Garden of Eden Creation Kit. Pre-war technology of that magnitude belongs in Brotherhood hands. Acquire it before the NCR or scavengers can claim it.
  components:
    - type: StealCondition
      stealGroup: FactionPlansVault
      owner: objective-condition-steal-vault

# Steal - capture NCR military intelligence holotape
# #Misfits Change - New BOSW objective: steal NCR operational plans
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBOSWStealObjective
  id: BOSWStealNCRObjective
  description: NCR forces have been documenting Brotherhood movements and supply lines. The Elders want their operational plans neutralised. Locate and secure the NCR plans holotape and bring it back to the Brotherhood.
  components:
    - type: StealCondition
      stealGroup: FactionPlansNCR
      owner: objective-condition-steal-ncr

# ----------------------------------------
# Caesar's Legion
