- type: constructionGraph
  id: GrilleDiagonal
  start: start
  graph:
    - node: start
      edges:
        - to: grilleDiagonal
          completed:
            - !type 
              southRotation: true
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
        - to: clockworkGrilleDiagonal
          completed:
            - !type 
              southRotation: true
          steps:
            - material: MetalRod
              amount: 2
              doAfter: 1
    - node: grilleDiagonal
      entity: GrilleDiagonal
      edges:
        - to: start
          completed:
            - !type 
              message: "A grille was cut"
            - !type 
              prototype: PartRodMetal1
              amount: 2
            - !type :DeleteEntity
          steps:
            - tool: Cutting
              doAfter: 1
    - node: clockworkGrilleDiagonal
      entity: ClockworkGrilleDiagonal
      edges:
        - to: start
          completed:
            - !type 
              message: "A grille was cut"
            - !type 
              prototype: PartRodMetal1
              amount: 2
            - !type :DeleteEntity
          steps:
            - tool: Cutting
              doAfter: 1
