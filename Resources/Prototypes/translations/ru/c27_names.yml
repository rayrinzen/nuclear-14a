# #Misfits Add - C-27 humanoid robot designation pools.
# Mirrors the per-variant *First dataset pattern used by RobotProtectron / RobotAssaultron.
# Format is "<FactionPrefix>-<NATO Phonetic>" so every C-27 reads as a serial-designated unit
# rather than a fleshname. Single-token by design so chat/UI ("Knight-Echo says…") stays clean.
# Used by the species blocks in _Misfits/Species/c27.yml via maleFirstNames / femaleFirstNames
# with naming: First, so no surname is appended.

