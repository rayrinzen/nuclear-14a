- type: reagent
  id: NitrousOxide
  name: reagent-name-nitrous-oxide
  desc: reagent-desc-nitrous-oxide
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#5d88c9"
  boilingPoint: -88
  meltingPoint: -90
  metabolisms:
    Gas:
      effects:
      - !type 
        conditions:
        - !type 
          reagent: NitrousOxide
          min: 0.2
          max: 0.5
        - !type 
          type: Slime
          shouldHave: false
        emote: Laugh
        showInChat: true
        probability: 0.1
      - !type 
        conditions:
        - !type 
          reagent: NitrousOxide
          min: 0.5
        - !type 
          type: Slime
          shouldHave: false
        type: Local
        visualType: Medium
        messages:
        - "effect-sleepy"
        probability: 0.1
      - !type 
        conditions:
        - !type 
          reagent: NitrousOxide
          min: 1
        - !type 
          type: Slime
          shouldHave: false
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type 
        conditions:
        - !type 
          reagent: NitrousOxide
          min: 1
        - !type 
          type: Slime
          shouldHave: false
        key: ForcedSleep
        component: ForcedSleeping
        time: 200 # This reeks, but I guess it works LMAO
        type: Add
      - !type 
        conditions:
        - !type 
          reagent: NitrousOxide
          min: 3.5
        - !type 
          type: Slime
          shouldHave: false
        ignoreResistances: true
        damage:
          types:
            Poison: 0.25
