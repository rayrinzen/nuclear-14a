- type: reagent
  id: Oxygen
  name: reagent-name-oxygen
  desc: reagent-desc-oxygen
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#c4f5ff"
  boilingPoint: '-183.0'
  meltingPoint: '-218.4'
  metabolisms:
    Gas:
      effects:
      - !type 
        conditions:
        - !type 
          type: Human
      - !type 
        conditions:
        - !type 
          type: Animal
      - !type 
        conditions:
        - !type 
          type: Rat
      - !type 
        conditions:
        - !type 
          type: Plant
      - !type 
        conditions:
        - !type 
          type: SuperMutant
      - !type 
        conditions:
        - !type 
          type: Vox
          shouldHave: false
        - !type 
          type: Plasmaman
          shouldHave: false
        ratios:
          CarbonDioxide: 1.0
          Oxygen: '-1.0'
      - !type 
        conditions:
        - !type 
          type: Vox
        scaleByQuantity: true
        ignoreResistances: true
        damage:
          types:
            Poison: 7
      - !type 
        alertType: HighOxygen
        conditions:
          - !type 
            min: 0.5
          - !type 
            type: Vox
        clear: true
        time: 5
      - !type 
        conditions:
        - !type 
          type: Plasmaman
        scaleByQuantity: true
        ignoreResistances: true
        damage:
          types:
            Poison: 7
      - !type 
        alertType: HighOxygen
        conditions:
          - !type 
            min: 0.5
          - !type 
            type: Plasmaman
        clear: true
        time: 5
- type: reagent
  id: Plasma
  name: reagent-name-plasma
  desc: reagent-desc-plasma
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#7e009e"
  recognizable: true
  boilingPoint: '-127.3' # Random values picked between the actual values for CO2 and O2
  meltingPoint: '-186.4'
  tileReactions:
  - !type 
    temperatureMultiplier: 1.5
  metabolisms:
    Poison:
      effects:
      - !type 
        conditions:
        - !type 
          type: Plasmaman
          shouldHave: false
        damage:
          types:
            Poison: 3
      - !type 
        conditions:
        - !type 
          type: Plasmaman
          shouldHave: false
        reagent: Inaprovaline
        amount: '-2.0'
    Gas:
      effects:
      - !type 
        conditions:
        - !type 
          type: Plasmaman
          shouldHave: false
        scaleByQuantity: true
        ignoreResistances: true
        damage:
          types:
            Poison: 1 # We need a metabolism effect on reagent removal
      - !type 
        alertType: Toxins
        conditions:
          - !type 
            type: Plasmaman
            shouldHave: false
          - !type 
            min: 1.5
        clear: True
        time: 5
      - !type 
        factor: 4
        conditions:
        - !type 
          type: Plasmaman
      - !type 
        conditions:
        - !type 
          type: Plasmaman
        ratios:
          Nitrogen: 1.0 # Interesting exhale for plasmamen
          Plasma: '-1.0'
    Medicine:
      effects:
      - !type 
        conditions:
        - !type 
          type: Plasmaman
        damage:
          groups:
            Brute: -2
          types:
            Heat: '-0.66'
            Shock: '-0.66'
            Caustic: '-0.66'
            Asphyxiation: '-0.66'
            Poison: '-0.66'
      - !type 
        conditions:
        - !type 
          type: Plasmaman
        - !type 
          reagent: Plasma
          min: 4
        moodPrototype: PlasmamanIngestPlasma
  reactiveEffects:
    Flammable:
      methods:
      - Touch
      effects:
      - !type :FlammableReaction
- type: reagent
  id: Tritium
  name: reagent-name-tritium
  desc: reagent-desc-tritium
  physicalDesc: reagent-physical-desc-ionizing
  flavor: bitter
  color: "#66ff33"
  tileReactions:
  - !type 
    temperatureMultiplier: 2.0
  reactiveEffects:
    Flammable:
      methods:
      - Touch
      effects:
      - !type 
        multiplier: 0.8
  metabolisms:
    Poison:
      effects:
      - !type 
        damage:
          types:
            Radiation: 3
    Gas:
      effects:
      - !type 
        scaleByQuantity: true
        ignoreResistances: true
        damage:
          types:
            Radiation: 1 # We need a metabolism effect on reagent removal
      - !type 
        alertType: Toxins
        conditions:
          - !type 
            min: 1.5
        clear: True
        time: 5
