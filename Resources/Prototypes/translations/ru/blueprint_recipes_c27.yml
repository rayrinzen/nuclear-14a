# #Misfits Add - C-27 chassis armor blueprint recipes.
#
# These recipes are gated by `requiresBlueprint: true` and only appear in the
# armor workbench's lathe UI when the matching C-27 Armor Blueprint item is
# placed inside the workbench's storage container (see
# Content.Server/_Misfits/Crafting/BlueprintSystem.cs -> LatheSystem.AddBlueprintRecipesFromStorage).
#
# Three factions × two weight classes × (armor + helmet) = 12 recipes.
# - Generic recipes: availableFaction omitted so any crafter with the
#   Generic blueprint can produce them.
# - NCR recipes:     availableFaction: NCR  (only NCR-faction crafters).
# - BoS recipes:     availableFaction: BrotherhoodOfSteel.
#
# Material budget mirrors tier-3-ish T-series armor in the upstream set
# (steel-plated robotic chassis, so Steel-heavy). Tune later if balance
# feedback requires.

# =====================================================================
# C-27 GENERIC
# =====================================================================
- type: latheRecipe
  id: N14BPC27ArmorMediumGeneric
  result: ClothingC27ArmorMediumGeneric
  category: N14BlueprintC27ArmorGeneric
  completetime: 10
  requiresBlueprint: true
  materials:
    Steel: 400
    Cloth: 200
    Thread: 150
    Plastic: 75

- type: latheRecipe
  id: N14BPC27HelmetMediumGeneric
