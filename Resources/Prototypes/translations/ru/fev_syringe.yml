# FEV Syringe
# Permanently transforms the injected character into a Super Mutant

- type: entity
  parent: PrefilledSyringe
  id: FEVSyringe
  name: FEV syringe
  description: A syringe filled with an experimental Forced Evolutionary Virus strain. The label warns this will cause permanent Super Mutant transformation. (This persists cross round)
  components:
    - type: Sprite
      sprite: Objects/Specific/Chemistry/syringe.rsi
      layers:
        - state: syringe1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          color: "#2e8b57"
        - state: syringe_base0
          map: [ "enum.SolutionContainerLayers.Base" ]
    - type: SolutionContainerManager
      solutions:
        injector:
          maxVol: 15
          reagents:
            - ReagentId: Epinephrine # Placeholder reagent, transformation happens via component
              Quantity: 15
    - type: SuperMutantTransformation
      updateDatabaseProfile: true
      targetSpecies: SuperMutant
      updateJob: true
      targetJob: SuperMutant
    - type: Tag
      tags:
        - Syringe
        - Trash

# Admin-only version for testing/events
- type: entity
  parent: FEVSyringe
  id: FEVSyringeInfinite
  suffix: Admin, Infinite
  components:
    - type: Injector
      injectOnly: true
      ignoreMobs: false
      minTransferAmount: 15
      maxTransferAmount: 15
      transferAmount: 15
    - type: SolutionContainerManager
      solutions:
        injector:
          maxVol: 150
          reagents:
            - ReagentId: Epinephrine
              Quantity: 150
