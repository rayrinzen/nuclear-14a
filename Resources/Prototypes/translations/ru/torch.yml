- type: entity
  name: torch
  parent: BaseItem
  id: Torch
  description: A torch fashioned from some wood.
  components:
    # #Misfits Change /Fix/: Make crafted torches permanent instead of burning out.
    - type: ItemToggle
      soundActivate:
        path: /Audio/Items/Flare/flare_on.ogg
      soundDeactivate:
        path: /Audio/Items/candle_blowing.ogg
    - type: Sprite
      sprite: Objects/Misc/torch.rsi
      layers:
        - map: [ enum.ExpendableLightVisualLayers.Base ]
          state: torch_unlit
        # #Misfits Fix: Use plain string key so ToggleableLightVisualsSystem (SpriteLayer is string?) can find this layer via LayerMapTryGet.
        # Previously used enum.ExpendableLightVisualLayers.Glow which caused a string/enum key mismatch, preventing the fire sprite from showing on the ground.
        - map: [ "torch_glow" ]
          state: lit_overlay
          color: "#FFFFFF"
          visible: false
          shader: unshaded
        - map: [ enum.ExpendableLightVisualLayers.Overlay ]
          state: torch_nocloth
    - type: Icon
      sprite: Objects/Misc/torch.rsi
      state: icon
    - type: Item
      sprite: Objects/Misc/torch.rsi
      heldPrefix: unlit
    - type: ToggleableLightVisuals
      spriteLayer: torch_glow
      inhandVisuals:
        left:
          - state: lit-inhand-left
            shader: unshaded
        right:
          - state: lit-inhand-right
            shader: unshaded
    - type: Construction
      graph: LightTorch
      node: torch
    - type: Appearance
    - type: PointLight
      enabled: false
      color: "#E25822"
      radius: 5.0
      energy: 7.0
      netsync: false
    - type: IgnitionSource
      temperature: 400
      ignited: false
    - type: ItemToggleHot
    - type: ItemTogglePointLight
    - type: Tag
      tags:
        - Torch
