# #Misfits Add - Tribal APA: X-01 power armor reskin for the Ug-Qualtoth tribal faction.
# Inherits ALL X-01 mechanics: Armor, ExplosionResistance, Reflect, PowerArmorIntegrity, ToggleableClothing.
# Only Sprite/Clothing paths and the toggled head prototype are overridden.

# --- Tribal APA Suit ---
- type: entity
  parent: N14ClothingOuterPowerArmorAdvanced2Hellfire
  id: N14ClothingOuterPowerArmorAdvanced2HellfireMisfit
  name: hellfire advanced power armor
  description: Hellfire power armor suit, a reskin of the X-01 with a fiery motif. The removal of servo drives has made it less mobile but retains a high level of protection and partial hermetic sealing. Tribal markings and ceremonial bones coat the surface, but the heads-up display still functions beneath them.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/OuterClothing/PowerArmor/hellfire_apa.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/OuterClothing/PowerArmor/hellfire_apa.rsi
      equipDelay: 3
      unequipDelay: 6
    - type: ToggleableClothing
      # Override only to point head at the tribal helmet; gloves/shoes/back unchanged from X-01
      clothingPrototypes:
        head: N14ClothingHeadHelmetPowerArmorHellfireMisfit
        gloves: N14ClothingPAGauntletsDark
        shoes: N14ClothingPABootsDark
        back: N14ClothingPowerSystemsBack
