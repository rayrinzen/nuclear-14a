- type: entity
  parent: N14Machete
  id: N14Gladius
  name: gladius
  description: The old sword of the Roman Empire. It is now in use by the Legion...
  components:
    - type: Clothing
      sprite: Corvax/Objects/Weapons/Melee/gladius.rsi
      quickEquip: false
      slots:
        - Belt
        - Back
        - suitStorage
    - type: Sprite
      sprite: Corvax/Objects/Weapons/Melee/gladius.rsi
      state: icon
    - type: DamageOtherOnHit
      damage:
        types:
          Slash: 25
    - type: MeleeWeapon
      damage:
        types:
          Slash: 44
      soundHit:
        path: /Audio/Weapons/bladeslice.ogg
    - type: Item
      sprite: Corvax/Objects/Weapons/Melee/gladius.rsi

- type: entity
  parent: BaseItem
  id: N14WeaponThermospear
  name: thermic lance
  description: "A long two-handed thermic lance. Fuel is needed for use."
  components:
    - type: Sprite
      sprite: Corvax/Objects/Weapons/Melee/thermospear.rsi
      layers:
        - state: icon
        - state: welder_flame
          visible: false
          shader: unshaded
          map: [ "enum.ToggleVisuals.Layer" ]
    - type: Item
      sprite: Corvax/Objects/Weapons/Melee/thermospear.rsi
      size: Huge
      # Misfits Fix - explicit inhand visuals so the weapon sprite shows correctly when held
      inhandVisuals:
        left:
          - state: inhand-left
        right:
          - state: inhand-right
    - type: Clothing
      sprite: Corvax/Objects/Weapons/Melee/thermospear.rsi
      quickEquip: false
      slots:
        - Back
        - suitStorage
    - type: GenericVisualizer
      visuals:
        enum.ToggleVisuals.Toggled:
          enum.ToggleVisuals.Layer:
            true: { visible: true }
            false: { visible: false }
    - type: ItemToggleSize
      activatedSize: Large
    - type: ItemToggleHot
    - type: UseDelay
    - type: ItemToggle
      predictable: false
      soundActivate:
        collection: WelderOn
        params:
          variation: 0.125
          volume: -5
      soundDeactivate:
        collection: WelderOff
        params:
          variation: 0.125
          volume: -5
    - type: MeleeWeapon
      soundHit:
        path: "/Audio/Weapons/smash.ogg"
        params:
          volume: -3
      damage:
        groups:
          Brute: 5
    - type: MultiHandedItem
    - type: ItemToggleMeleeWeapon
      activatedSoundOnHit:
        path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
        params:
          variation: 0.250
          volume: -10
      activatedSoundOnHitNoDamage:
        path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
        params:
          variation: 0.250
          volume: -12
      deactivatedSoundOnHitNoDamage:
        collection: MetalThud
      activatedDamage:
        types:
          Heat: 55
    # Misfits Fix - WelderComponent restores fuel quantity display when held
    - type: Welder
    - type: RefillableSolution
      solution: Welder
    - type: SolutionContainerManager
      solutions:
        Welder:
          reagents:
            - ReagentId: WeldingFuel
              Quantity: 250
          maxVol: 250
    - type: PointLight
      enabled: false
      radius: 2
      color: orange
      netsync: false
    - type: Appearance
    - type: RequiresEyeProtection
    - type: IgnitionSource
      temperature: 700

- type: entity
  parent: BaseItem
  id: N14WeaponKebab
  name: Shishkebab
  description: "A one-handed homemade weapon powered by fuel."
  components:
    - type: Sprite
      sprite: Corvax/Objects/Weapons/Melee/kebab.rsi
      layers:
        - state: icon
        - state: welder_flame
          visible: false
          shader: unshaded
          map: [ "enum.ToggleVisuals.Layer" ]
    - type: Item
      sprite: Corvax/Objects/Weapons/Melee/kebab.rsi
      size: Huge
      # Misfits Fix - explicit inhand visuals so the weapon sprite shows correctly when held
      inhandVisuals:
        left:
          - state: inhand-left
        right:
          - state: inhand-right
    - type: Clothing
      sprite: Corvax/Objects/Weapons/Melee/kebab.rsi
      quickEquip: false
      slots:
        - belt
    - type: GenericVisualizer
      visuals:
        enum.ToggleVisuals.Toggled:
          enum.ToggleVisuals.Layer:
            true: { visible: true }
            false: { visible: false }
    - type: ItemToggleSize
      activatedSize: Large
    - type: ItemToggleHot
    - type: ToggleableLightVisuals
      spriteLayer: flame
      inhandVisuals:
        left:
          - state: inhand-left-flame
            shader: unshaded
        right:
          - state: inhand-right-flame
            shader: unshaded
    - type: UseDelay
    - type: ItemToggle
      predictable: false
      soundActivate:
        collection: WelderOn
        params:
          variation: 0.125
          volume: -5
      soundDeactivate:
        collection: WelderOff
        params:
          variation: 0.125
          volume: -5
    - type: MeleeWeapon
      attackRate: 1
      soundHit:
        path: "/Audio/Weapons/smash.ogg"
        params:
          volume: -3
      damage:
        groups:
          Brute: 5
    - type: ItemToggleMeleeWeapon
      activatedSoundOnHit:
        path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
        params:
          variation: 0.250
          volume: -10
      activatedSoundOnHitNoDamage:
        path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
        params:
          variation: 0.250
          volume: -12
      deactivatedSoundOnHitNoDamage:
        collection: MetalThud
      activatedDamage:
        types:
          Heat: 50
    # Misfits Fix - WelderComponent restores fuel quantity display when held
    - type: Welder
    - type: RefillableSolution
      solution: Welder
    - type: SolutionContainerManager
      solutions:
        Welder:
          reagents:
            - ReagentId: WeldingFuel
              Quantity: 250
          maxVol: 250
    - type: PointLight
      enabled: false
      radius: 1.5
      color: orange
      netsync: false
    - type: Appearance
    - type: RequiresEyeProtection
    - type: IgnitionSource
      temperature: 700
