- type: constructionGraph
  id: FenceMetal
  start: start
  graph:
  - node: start
    actions:
    - !type ':DeleteEntity { }'
    edges:
    - to: straight
      completed:
      - !type 
        southRotation: true
      steps:
      - material: MetalRod
        amount: 5
        doAfter: 6
    - to: corner
      completed:
      - !type 
        southRotation: true
      steps:
      - material: MetalRod
        amount: 5
        doAfter: 6
    - to: end
      completed:
      - !type 
        southRotation: true
      steps:
      - material: MetalRod
        amount: 5
        doAfter: 6
    - to: gate
      completed:
      - !type 
        southRotation: true
      steps:
      - material: MetalRod
        amount: 5
        doAfter: 6
  - node: straight
    entity: FenceMetalStraight
    edges:
    - to: broken
      completed:
      - !type 
        prototype: PartRodMetal1
        amount: 1
      steps:
      - tool: Welding
        doAfter: 4
      - tool: Cutting
        doAfter: 1
  - node: corner
    entity: FenceMetalCorner
    edges:
    - to: start
      completed:
      - !type 
        prototype: PartRodMetal1
        amount: 5
      - !type :DeleteEntity
      steps:
      - tool: Welding
        doAfter: 4
      - tool: Cutting
        doAfter: 2
  - node: end
    entity: FenceMetalEnd
    edges:
    - to: start
      completed:
      - !type 
        prototype: PartRodMetal1
        amount: 5
      - !type :DeleteEntity
      steps:
      - tool: Welding
        doAfter: 4
      - tool: Cutting
        doAfter: 2
  - node: gate
    entity: FenceMetalGate
    edges:
    - to: start
      completed:
      - !type 
        prototype: PartRodMetal1
        amount: 5
      - !type :DeleteEntity
      steps:
      - tool: Welding
        doAfter: 4
      - tool: Cutting
        doAfter: 2
  - node: broken
    entity: FenceMetalBroken
    edges:
    - to: start
      completed:
      - !type 
        prototype: PartRodMetal1
        amount: 1
      - !type :DeleteEntity
      steps:
      - tool: Cutting
        doAfter: 1
