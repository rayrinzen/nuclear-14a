# Misfits Add - Wendover region lore holotapes with readable content.
# Each holotape has a unique story tied to the Wendover, Utah wasteland setting.
# Use on a terminal or Pip-Boy to read the green-on-black terminal viewer.

# A wastelander's field journal about water sources and dangers around Wendover
- type: entity
  parent: N14HolotapeYellow
  id: N14HolotapeLoreProspector
  name: prospector's journal holotape
  description: A dusty holotape labelled "SURVEY NOTES - WENDOVER BASIN".
  components:
    - type: HolotapeData
      title: holotape-prospector-title
      content: holotape-prospector-content

# The Vault Overseer's final log before the vault door opened
- type: entity
  parent: N14HolotapeGreen
  id: N14HolotapeLoreOverseer
  name: overseer's log holotape
  description: A green holotape with "OVERSEER - EYES ONLY" etched into the casing.
  components:
    - type: HolotapeData
      title: holotape-overseer-title
      content: holotape-overseer-content

# NCR scout reconnaissance report on the Wendover corridor
- type: entity
