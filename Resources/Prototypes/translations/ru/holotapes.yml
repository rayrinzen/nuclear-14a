# ─────────────────────────────────────────────────────────────────────────────
# #Misfits Add - Generic color holotape variants with randomized wasteland content.
# Use these entities (instead of base N14 color holotapes) when placing readable
# holotapes on Wendover or Vault maps. Each one draws a random entry from the
# holotape-wanderer dataset pool per round, ensuring variety across playthroughs.
# ─────────────────────────────────────────────────────────────────────────────
# Black / generic holotape with random wanderer content
- type: entity
  parent: N14Holotape
  id: N14HolotapeMisfitsRandom
  name: holotape
  description: A scratched holotape of unknown origin. Somebody recorded something on it.
  components:
    - type: TerminalRandomContent
      contentPool:
        - MisfitsHolotapeWanderer

