- # Sentry Bot missile launch world-target action.
# Fires an N14ProjectileMissile at the targeted location with a warning popup.
# Granted automatically by SentryBotMissileLauncherSystem on chassis init.
type: entity
  id: ActionSentryBotMissileLaunch
  name: Launch Missile
  description: Launch a missile at the targeted location. Nearby entities receive a warning.
  categories:
  - HideSpawnMenu
  components:
  - type: WorldTargetAction
    useDelay: 30
    range: 20
    itemIconStyle: BigAction
    checkCanAccess: false
    raiseOnUser: true
    icon:
      sprite: _Nuclear14/Objects/Weapons/Guns/Heavy/missilelauncher.rsi
      state: base
    event: !type :SentryBotMissileLaunchEvent
