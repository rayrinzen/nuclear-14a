- # #Misfits Add - Cryo projectile for Firefighter Protectron integrated cryo emitter.
# Deals Cold damage and applies stamina drain on impact, simulating a cryogenic freeze effect.
type: entity
  name: cryo bolt
  id: BulletCryo
  parent: BaseBullet
  categories:
  - HideSpawnMenu
  components:
  - type: FlyBySound
    sound:
      path: /Audio/Effects/extinguish.ogg
      params:
        volume: -5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser_greyscale
      shader: unshaded
      color: "#6ECEFF" # light blue tint to distinguish from laser
  - type: Fixtures
    fixtures:
      projectile:
        shape: '!type:PhysShapeAabb bounds: "-0.2,-0.2,0.2,0.2"'
        hard: false
        mask:
        - Opaque
      fly-by:  # fly-by fixture for FlyBySound — defined inline since YAML anchors are file-scoped
        shape: !type
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        hard: false
  - type: StaminaDamageOnCollide # slows target, simulating cryo freeze
    damage: 15
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Cold: 8 # low cold damage — cryo emitter is a suppression/control tool, not a killing weapon
    soundHit:
      path: /Audio/Effects/extinguish.ogg
