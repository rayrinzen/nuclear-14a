- # #Misfits Add - NCR Heavy Trooper job: T4.5 heavy weapons specialist between Specialist and Sergeant.
# Armed with the standard minigun and salvaged NCR T-45 power armor (no training required). # #Misfits Tweak - downgraded from Avenger to standard minigun
# 25% innate speed penalty from the armor frame; no servo-lock if armor breaks.
type: job
  id: NCRHeavyTrooper
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 45 # between Specialist (40) and Sergeant (50)
  showBorder: true
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-ncr-heavy-trooper
  description: job-description-ncr-heavy-trooper
  playTimeTracker: NCRHeavyTrooper
  requirements:
    - !type 
      species:
      - Human
      - Ghoul
    - !type 
      department: NCR
      min: 50400 # 14 hours
  startingGear: NCRHeavyTrooperGear
  icon: "JobIconNcrSpec" # closest fitting icon: specialist tier
  supervisors: job-supervisors-ncr-sergeant
  alwaysUseSpawner: true
  access:
  - NCR
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - NCR
- type: startingGear
  id: NCRHeavyTrooperGear
  equipment:
    head: N14ClothingHeadHelmetPowerArmorT45NCR # NCR variant T-45 helmet
    back: N14ClothingBackpackNCR # #Misfits Fix - Minigun moved to pocket1 so custom backpack selection no longer overwrites it
    jumpsuit: N14ClothingOfficerUniformNCRDesert # standard NCR officer uniform under the suit
    outerClothing: N14ClothingOuterPowerArmorT45NCRSalvaged # salvaged T-45 (no training required)
    shoes: N14ClothingBootsCombatFilled
    ears: N14ClothingHeadsetNCR # NCR radio earpiece
    neck: ClothingNeckPinNCRSpecialist # enlisted heavy weapons rank
    belt: ClothingBeltNCR
    pocket1: N14WeaponMinigun # #Misfits Tweak - downgraded to minigun again -bill
    pocket2: RadioHandheld
    id: N14IDNCRDogtagWS # Specialist-tier dogtag
  innerClothingSkirt: N14ClothingOfficerUniformNCRDesert
  satchel: N14ClothingBackpackSatchelNCRFilled
  storage:
    back:
    - N14MagazineMinigun5mm
- type: playTimeTracker
  id: NCRHeavyTrooper
