        key: RecoveryDrugActive
        component: RecoveryDrugActiveComponent
        type: Add
        time: 3
        refresh: true
      - !type 
        damage:
          groups:
            Burn: '-1.5'
            Brute: '-2.5'
      - !type 
        amount: '-0.5'
      - !type 
        conditions:
        - !type 
          min: 30
