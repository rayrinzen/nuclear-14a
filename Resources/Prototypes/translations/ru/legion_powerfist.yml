# Goliath remains a melee gauntlet, but it needs to live in the glove slot so the
# veteran loadout can equip it and use its punch-weapon behavior consistently.
- type: entity
  parent: ClothingHandsBase
  id: N14ClothingHandsPowerFistGoliath
  name: goliath power fist
  description: A captured Legion shock gauntlet built around a piston-assisted ram that hurls targets backward.
  components:
    - type: Sprite
      sprite: _Nuclear14/Clothing/Hands/PowerGauntlets/basic.rsi
      state: icon
      scale: 0.75, 0.75
    - type: Item
      size: Normal
      sprite: _Nuclear14/Clothing/Hands/PowerGauntlets/basic.rsi
    - type: Clothing
      sprite: _Misfits/Objects/Weapons/Melee/powerfist.rsi
      slots: [ gloves ]
    - type: MeleeWeapon
      soundHit:
        collection: MetalThud
      range: 1.3
      attackRate: 0.8
      damage:
        types:
          Blunt: 35
          Structural: 15
      animation: WeaponArcFist
      wideAnimation: WeaponArcFist
      mustBeEquippedToUse: true
    - type: MeleeThrowOnHit
      speed: 10
      lifetime: 0.025
