    - /Audio/_Misfits/N14/Ambience/bird_4.ogg
    - /Audio/_Misfits/N14/Ambience/bird_5.ogg
    - /Audio/_Misfits/N14/Ambience/bird_6.ogg
    - /Audio/_Misfits/N14/Ambience/bird_7.ogg
