- # #Misfits Add: Localized Fallout ambience hooks and supporting sound collections for N14.
type: rules
  id: NearN14Cave
  rules:
    - !type 
      percent: 0.25
      tiles:
        - FloorCave
        - FloorCaveDrought
      range: 3
- type: rules
  id: NearN14Vault
  rules:
    - !type 
      percent: 0.25
      tiles:
        - FloorRockVault
      range: 3
- type: rules
  id: NearN14Shack
  rules:
    - !type 
      percent: 0.35
      tiles:
        - FloorDirtIndoors
      range: 3
- type: ambientMusic
  id: N14LocalizedWasteland
  sound:
    params:
      volume: -12
    collection: N14AmbienceWastelandLocalized
  rules: NearWasteland
  priority: 2
- type: ambientMusic
  id: N14LocalizedShack
  sound:
    params:
      volume: -11
    collection: N14AmbienceShackLocalized
  rules: NearN14Shack
  priority: 3
- type: ambientMusic
  id: N14LocalizedCave
  sound:
    params:
      volume: -10
    collection: N14AmbienceCaveLocalized
  rules: NearN14Cave
  priority: 4
- type: ambientMusic
  id: N14LocalizedVault
  sound:
    params:
      volume: -10
    collection: N14AmbienceVaultLocalized
  rules: NearN14Vault
  priority: 5
- type: soundCollection
  id: N14TerminalKeyboard
  files:
    - /Audio/_Misfits/N14/Machines/terminalkeytap01.ogg
    - /Audio/_Misfits/N14/Machines/terminalmenuenter.ogg
    - /Audio/_Misfits/N14/Machines/terminalmenucancel.ogg
