- type: reagent
  id: TeaBroc
  parent: GreenTea
  name: reagent-name-tea-broc
  desc: reagent-desc-tea-broc
  metabolisms:
    Drink:  #Misfits Fix: defining Medicine: replaces the inherited Drink: from BaseDrink, so we must re-declare it to restore thirst satiation
      effects:
      - !type 
        factor: 3
    Medicine:
      effects:
      - !type 
        damage:
          groups:
            Burn: '-0.25'
            Brute: '-0.25'
- type: reagent
  id: TeaDatura
  parent: GreenTea
  name: reagent-name-tea-datura
  desc: reagent-desc-tea-datura
  metabolisms:
    Drink:  #Misfits Fix: defining Poison: replaces the inherited Drink: from BaseDrink; re-declare it so datura tea still quenches thirst (TeaWhiteHorsenettle inherits this fix)
      effects:
      - !type 
        factor: 3
    Poison:
      effects:
      - !type 
        damage:
          types:
            Asphyxiation: 2.5
