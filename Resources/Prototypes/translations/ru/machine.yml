- type: constructionGraph
  id: Machine
  start: start
  graph:
    - node: start
      actions:
        - !type 
          prototype: SheetSteel1
        - !type :DeleteEntity
      edges:
        - to: missingWires
          completed:
            - !type 
              value: false
          steps:
            - material: Steel
              amount: 5
              doAfter: 3
        - to: destroyedMachineFrame
          steps:
            - material: Steel
              amount: 5
              doAfter: 3
    - node: missingWires
      entity: UnfinishedMachineFrame
      actions:
        - !type :EmptyAllContainers
      edges:
        - to: machineFrame
          conditions:
            - !type :EntityAnchored
          steps:
            - material: Cable
        - to: start
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 5
            - !type :DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 2
    - node: machineFrame
      entity: MachineFrame
      actions:
        - !type 
          container: machine_parts
        - !type 
          container: machine_board
        - !type :MachineFrameRegenerateProgress
      edges:
        - to: machine
          conditions:
            - !type :EntityAnchored
            - !type 
              guideIconBoard:
                sprite: Objects/Misc/module.rsi
                state: id_mod
              guideIconParts:
                sprite: Objects/Misc/stock_parts.rsi
                state: scan_module
          steps:
            - tool: Screwing
              doAfter: 1
        - to: machineFrame
          conditions:
            - !type :EntityAnchored
            - !type 
              container: machine_board
          steps:
            - tool: Prying
              doAfter: 2
              completed:
                - !type :EmptyAllContainers
                - !type :MachineFrameRegenerateProgress
        - to: missingWires
          conditions:
            - !type :EntityAnchored
            - !type 
              container: machine_board
              examineText: construction-condition-machine-container-empty
          completed:
            - !type 
              prototype: CableApcStack1
          steps:
            - tool: Cutting
              doAfter: 1
    - node: machine
      entity: !type
      ":BoardNodeEntity { container": machine_board }
      edges:
        - to: machineFrame
          completed:
            - !type 
              event: !type :MachineDeconstructedEvent
              broadcast: false
          conditions:
            - !type :EntityAnchored
            - !type :WirePanel
          steps:
            - tool: Prying
              doAfter: 2
    - node: destroyedMachineFrame
      entity: MachineFrameDestroyed
      edges:
        - to: start
          steps:
            - tool: Welding
              doAfter: 5
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 3
            - !type ':DeleteEntity {}'
