- type: trait
  id: N14Poisoned
  category: Physical
  points: 3
  requirements:
    - !type 
      inverted: true
      traits:
        - N14UnnaturalReg
    - !type 
      species:
        - Human
  functions:
    - !type 
      components:
        - type: PassiveDamage
          allowedStates:
          - Alive
          - Critical
          damageCap: 200
          damage:
            types:
              Poison: 0.07
- type: trait
  id: N14UnnaturalReg
  category: Physical
  points: -5
  requirements:
    - !type 
      inverted: true
      traits:
        - N14Poisoned
    - !type 
      species:
        - Human
  functions:
    - !type 
      components:
        - type: PassiveDamage
          allowedStates:
          - Alive
          damageCap: 200
          damage:
            types:
              # #Misfits Fix - PassiveDamage group healing is split across member types; direct types make burn regeneration visible.
              Blunt: '-0.035'
              Slash: '-0.035'
              Piercing: '-0.035'
              Heat: '-0.035'
              Shock: '-0.035'
              Cold: '-0.035'
              Caustic: '-0.035'
              Asphyxiation: '-0.035'
              Bloodloss: '-0.035'
              Poison: '-0.015'
              Radiation: '-0.015'
