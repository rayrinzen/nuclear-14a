- # Expedition exit zone entity — spawned at every faction spawn coordinate
# when a map defines factionSpawns. Emits a bright green glow so players
# know this is where they can leave.  Walking onto it OR pressing E both
# trigger the return teleport.
type: entity
  id: N14ExpeditionExitPoint
  name: n14-expedition-exit-name
  description: n14-expedition-exit-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: N14ExpeditionExit
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: Markers/cross.rsi
    state: green
    visible: true
    color: "#52FF39"
  - type: PointLight
    radius: 3
    energy: 4
    color: "#52FF39" # bright neon green — covers the 3×3 extraction zone
    castShadows: false
  - type: InteractionOutline
  - type: Clickable
  -   # Walk-on trigger — teleport as soon as a mob steps onto the flare
type: StepTrigger
    requiredTriggeredSpeed: 0 # any speed counts, even standing
    intersectRatio: 0.1
    stepOn: true # CRITICAL — without this, StepTriggeredOnEvent is never raised
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: '!type:PhysShapeAabb bounds: "-1.5, -1.5, 1.5, 1.5"' # 3×3 tile extraction zone
        density: 80
        hard: false # non-blocking — players walk through the flare
        layer:
        - LowImpassable
        mask:
        - Impassable
