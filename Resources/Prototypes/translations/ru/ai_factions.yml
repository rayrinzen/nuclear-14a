# #Misfits Change - Old split BoS AI factions commented out.
# Consolidated to BrotherhoodOfSteel.

# #Misfits Add - Separate faction for player-job Raiders so NPC Raiders treat them as hostile
# rather than friendly (same-faction NPCs skip combat checks against each other).
- type: npcFaction
  id: PlayerRaider
  hostile:
    - Raider

# #Misfits Add - Player Robot faction for Synthetic job prototypes (Mr. Handy, Protectron, etc.).
# Kept separate from HostileRobot so NPC robots don't auto-aggro player bots.
# #Misfits Fix - Added hostile list so player robots are enemies to all NPC factions
- type: npcFaction
  id: PlayerRobot
  hostile:
    - Raider
    - HostileRobot
    - WastelandInsect
    - WastelandAnimal
    - Deathclaw
    - Feral
    - SuperMutant
    - Zetan

# #Misfits Add - Player SentryBot faction. Allied with HostileRobot so NPC robots treat
# player SentryBots as allies (protect them, won't aggro) rather than neutral bystanders.
# Kept separate from PlayerRobot so only SentryBot gets the NPC robot alliance.
- type: npcFaction
  id: PlayerSentryBot
  friendly:
    - HostileRobot

# #Misfits Add - Player Super Mutant faction for FEV Mutant job prototypes.
# Kept separate from the NPC SuperMutant faction so NPC mutants don't auto-aggro player mutants.
- type: npcFaction
  id: PlayerSuperMutant

