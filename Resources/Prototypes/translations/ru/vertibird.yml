- # #Misfits Add: Decorative Vertibird wreck for mapping and scene dressing.
type: entity
  parent: BaseStructure
  id: N14VehicleVertibirdWreck
  name: grounded vertibird
  description: A grounded pre-War tilt-rotor aircraft with enough bulk to dominate the skyline.
  suffix: Mapping
  components:
  - type: Sprite
    sprite: _Misfits/N14/Objects/Vehicles/vertibird.rsi
    state: vertibird
    drawdepth: Mobs
    noRot: true
    offset: 0, 1.8
    scale: 0.6, 0.6
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: '!type:PhysShapeAabb bounds: "-1.6,-0.6,1.6,0.6"'
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger: '!type:DamageTrigger damage: 250 behaviors: - !type:PlaySoundBehavior sound: collection: MetalBreak - !type:DoActsBehavior acts: [ "Destruction" ]'
