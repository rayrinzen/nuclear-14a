# Tesla Electron Charge Pack — kept active for the Tesla Cannon (fires TeslaGunBullet projectiles).
- type: entity
  name: tesla electron charge pack
  description: An electron charge pack modified to discharge a sustained ball of electricity rather than a focused beam. The Tesla Cannon's signature munition.
  id: N14TeslaElectronChargePack
  suffix: Full
  parent: N14BasePowerCell
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/ECP.rsi
      layers:
        - map: [ "enum.PowerCellVisualLayers.Base" ]
          state: empty
          scale: 0.5, 0.5
        - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
          state: o2
          scale: 0.5, 0.5
          shader: unshaded
    - type: Tag
      tags:
        - N14PowerCellAdvanced # fits Tesla Cannon whitelist
        - N14AmmoCell
    - type: Battery
      maxCharge: 2375
      startingCharge: 2375
    - type: HitscanBatteryAmmoProvider # Override parent hitscan — this cell fires projectiles only
      proto: N14MFLaserRed
      fireCost: 999999 # Effectively disabled — cost exceeds maxCharge so hitscan never fires
    - type: ProjectileBatteryAmmoProvider
      proto: TeslaGunBullet
      fireCost: 250

