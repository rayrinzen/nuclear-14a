# Super Mutant species definition.
# Large FEV-mutated humanoids with hands and full clothing support.
# Uses displacement maps to warp 32x32 clothing onto 32x48 body. # Misfits Change

- type: species
  id: SuperMutant
  name: species-name-supermutant
  roundStart: true
  order: 3 # #Misfits Change: sort after Glowing Ghoul
  whitelistRequired: true # #Misfits Change
  restrictedCustomization: true # #Misfits Change
  allowedLoadoutCategories: # #Misfits Change
    - Weapons
    - Bags
    - Backpacks
    - Duffel
    - Satchel
    - Items
    - Uniform
    - Outer
    - Hands
    - Shoes
    - Head
    - Mask
    - Accessories
  allowedTraitCategories: # #Misfits Change: allow traits via same mechanism as loadouts
    - Uncategorized
    - Auditory
    - Mental
    - Speech
    - TraitsSpeechUncategorized
    - TraitsSpeechAccents
    - TraitsSpeechLanguages
    - Visual
    - Language
    - Pets
  jobWhitelistUnlock: SuperMutant # #Misfits Change: job whitelist for SuperMutant unlocks this species
  restrictedJobs: # #Misfits Change
    - SuperMutant
  prototype: N14MobSuperMutant
  sprites: MobSuperMutantSprites
  markingLimits: MobSuperMutantMarkingLimits
  dollPrototype: N14MobSuperMutantDummy
  skinColoration: Hues
  defaultSkinTone: "#6b8e23"
  minHeight: 1.5
  defaultHeight: 1.5
  maxHeight: 1.5
  minWidth: 1.5
  defaultWidth: 1.5
  maxWidth: 1.5
  sexes:
    - Male
    - Female

# Body sprite layers for the super mutant species.
- type: speciesBaseSprites
  id: MobSuperMutantSprites
  sprites:
    Head: MobSuperMutantHead
    Chest: MobSuperMutantTorso
    LArm: MobSuperMutantLArm
    RArm: MobSuperMutantRArm
    LHand: MobSuperMutantLHand
    RHand: MobSuperMutantRHand
    LLeg: MobSuperMutantLLeg
    RLeg: MobSuperMutantRLeg
    LFoot: MobSuperMutantLFoot
    RFoot: MobSuperMutantRFoot

- type: markingPoints
  id: MobSuperMutantMarkingLimits
  onlyWhitelisted: true
  points:
    Chest:
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 2
      required: false
    RightHand:
      points: 2
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 2
      required: false

