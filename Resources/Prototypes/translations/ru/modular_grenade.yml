- type: constructionGraph
  id: ModularGrenadeGraph
  start: start
  graph:
  - node: start
    edges:
    - to: emptyCase
      steps:
      - material: Steel
        amount: 5
        doAfter: 1
  - node: emptyCase
    entity: ModularGrenade
    actions:
    - !type :AppearanceChange
    edges:
    - to: wiredCase
      steps:
      - material: Cable
        doAfter: 1
    - to: start
      completed:
      - !type 
        prototype: SheetSteel1
        amount: 5
      - !type :DeleteEntity
      steps:
      - tool: Welding
        doAfter: 2
  - node: wiredCase
    entity: ModularGrenade
    actions:
    - !type :AppearanceChange
    - !type 
      sound: /Audio/Machines/button.ogg
    edges:
    - to: emptyCase
      steps:
      - tool: Cutting
        doAfter: 1
        completed:
        - !type 
          prototype: CableApcStack1
    - to: caseWithTrigger
      steps:
      - component: PayloadTrigger
        store: payloadTrigger
        name: Trigger
        doAfter: 1
  - node: caseWithTrigger
    actions:
    - !type :AppearanceChange
    - !type 
      sound: /Audio/Machines/button.ogg
    edges:
    - to: wiredCase
      steps:
      - tool: Prying
        doAfter: 1
        completed:
        - !type 
          container: payloadTrigger
    - to: grenade
      steps:
      - tag: Payload
        store: payload
        name: Payload
        doAfter: 1
  - node: grenade
    actions:
    - !type :AppearanceChange
    - !type 
      sound: /Audio/Machines/button.ogg
    - !type 
      message: "A grenade was crafted"
    edges:
    - to: caseWithTrigger
      steps:
      - tool: Prying
        doAfter: 1
        completed:
        - !type 
          container: payload
