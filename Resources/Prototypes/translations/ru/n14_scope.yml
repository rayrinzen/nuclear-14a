- # #Misfits Removed - Old N14ScopeToggleEvent-based action, replaced by RMC-style ToggleActionEvent system
# - type: entity
#   id: N14ActionToggleScope_OLD
#   ...
# N14 scope toggle action — activates directional scoping on the held item
type: entity
  id: N14ActionToggleScope
  name: n14-action-toggle-scope
  description: n14-action-toggle-scope-description
  categories:
  - HideSpawnMenu
  components:
  - type: InstantAction
    checkCanInteract: true
    icon:
      sprite: _Misfits/Objects/Devices/binoculars.rsi
      state: binoculars_civ
    event: !type ':ToggleActionEvent {}'
- # N14 cycle zoom level action — cycles through available zoom levels on multi-zoom scopes
type: entity
  id: N14ActionCycleZoomLevel
  name: n14-action-cycle-zoom
  description: n14-action-cycle-zoom-description
  categories:
  - HideSpawnMenu
  components:
  - type: InstantAction
    checkCanInteract: true
    icon:
      sprite: _Nuclear14/Objects/Misc/crafting_junk.rsi
      state: scope
    event: !type ':ScopeCycleZoomLevelEvent {}'
