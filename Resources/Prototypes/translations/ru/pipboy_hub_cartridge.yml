- # #Misfits Add - PipBoy Hub cartridge prototypes (split into Contacts, Groups, Directory, Settings).
# The old monolithic PipBoyHubCartridge is commented out below.
# Each program shares PipBoyHubCartridgeComponent on the server and PipBoyHubUiState for state,
# but has its own focused UI fragment on the client.
# ── Old monolithic cartridge (kept for reference, no longer preinstalled) ──
# - type: entity
#   parent: BaseItem
#   id: PipBoyHubCartridge
#   name: pipboy hub cartridge
#   description: A PipBoy networking cartridge. Contacts, group chat, directory, and security.
#   components:
#   - type: Sprite
#     sprite: DeltaV/Objects/Devices/cartridge.rsi
#     state: cart-chat
#   - type: Icon
#     sprite: DeltaV/Objects/Devices/cartridge.rsi
#     state: cart-chat
#   - type: UIFragment
#     ui: !type:PipBoyHubUi
#   - type: Cartridge
#     programName: pipboy-hub-program-name
#     icon:
#       sprite: _Nuclear14/Objects/Misc/pipboy.rsi
#       state: pda
#   - type: PipBoyHubCartridge
# ── Contacts: contact management, SOS beacon, quick messaging, notes ──
type: entity
  parent: BaseItem
  id: PipBoyContactsCartridge
  name: Pip-Boy contacts cartridge
  description: Manage Pip-Boy contacts, send messages, and broadcast SOS beacons.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: Icon
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: UIFragment
    ui: !type :PipBoyContactsUi
  - type: Cartridge
    programName: pipboy-contacts-program-name
    icon:
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
  - type: PipBoyHubCartridge
- # ── Groups: group chat, waypoints, encryption, map tracking ──
type: entity
  parent: BaseItem
  id: PipBoyGroupsCartridge
  name: Pip-Boy groups cartridge
  description: Create or join group channels for coordinated communication and map tracking.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: Icon
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: UIFragment
    ui: !type :PipBoyGroupsUi
  - type: Cartridge
    programName: pipboy-groups-program-name
    icon:
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
  - type: PipBoyHubCartridge
- # ── Directory: network-wide PipBoy listing, dead drops ──
type: entity
  parent: BaseItem
  id: PipBoyDirectoryCartridge
  name: Pip-Boy directory cartridge
  description: Browse all visible Pip-Boys on the network and manage dead drops.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: Icon
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: UIFragment
    ui: !type :PipBoyDirectoryUi
  - type: Cartridge
    programName: pipboy-directory-program-name
    icon:
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
  - type: PipBoyHubCartridge
- # ── Settings: visibility, status, password lock ──
type: entity
  parent: BaseItem
  id: PipBoySettingsCartridge
  name: Pip-Boy settings cartridge
  description: Configure Pip-Boy visibility, presence status, and password lock.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: Icon
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: UIFragment
    ui: !type :PipBoySettingsUi
  - type: Cartridge
    programName: pipboy-settings-program-name
    icon:
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
  - type: PipBoyHubCartridge
