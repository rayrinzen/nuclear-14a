# C-27 Humanoid Robot armor selection kits. #Misfits Add
# Three faction-specific loadout-kit boxes (Generic / NCR / Brotherhood) are given at spawn
# via StartingGear subGear entries in C27Gear, keyed by CharacterSpeciesRequirement so each
# model variant (C27, C27NCR, C27BoS) receives their matching kit in pocket1.
#
# Structure:
#   C27Gear (base: chassis jumpsuit + subGear list)
#     └─ subGear per species → pocket1 = [C27GenericLoadoutKit | C27NCRLoadoutKit | C27BoSLoadoutKit]
#          └─ possibleSets → [Light | Medium | Heavy] UndecidedLoadoutBackpackSet
#               └─ content → KitC27_**** entity (SpawnItemsOnUse: armor + helmet pair)

# --- ABSTRACT BASE: shared sprite / UI bindings for all C-27 kit boxes --------
- type: entity
  id: BaseC27LoadoutKit
  name: C-27 Armor Selection Kit
  description: A factory-sealed loadout crate for your chassis armor. Choose your weight class.
  parent: BaseLoadoutKit
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Misc/kits.rsi
      state: rifleman # placeholder — no C27-specific kit sprite yet

# --- LOADOUT KIT BOX ENTITIES (one per faction model, given via startingGear) -
# #Misfits Tweak - default loadout kits restricted to Light only.
# Medium / Heavy variants are no longer issued at spawn; they must be crafted at
# an armor workbench using a C-27 Armor Blueprint (NCR / BoS / Generic). The
# concrete KitC27_*Medium / *Heavy entities and their UndecidedLoadoutBackpackSet
# definitions below are kept (they are now spawned by the blueprint lathe recipes).
# #Misfits Removed - Generic-model loadout kit no longer issued.
# The 'Unassigned' (C27 species) variant now spawns with the chassis jumpsuit only;
# any armor must be obtained through crafting via the Generic C-27 Armor Blueprint.
# Kept commented out per the no-deletion rule so the prototype ID can be restored
# without losing the original Light/Medium/Heavy picker.
#- type: entity
#  id: C27GenericLoadoutKit
#  name: C-27 Armor Selection Kit
#  description: Select your chassis armor weight class. Generic faction markings.
#  parent: BaseC27LoadoutKit
#  components:
#  - type: UndecidedLoadoutBackpack
#    possibleSets:
#    - C27_GenericLightSet
#    - C27_GenericMediumSet
#    - C27_GenericHeavySet
- type: entity
  id: C27NCRLoadoutKit
  name: C-27 NCR Armor Selection Kit
  description: Select your chassis armor weight class. New California Republic faction markings.
  parent: BaseC27LoadoutKit
  components:
    - type: UndecidedLoadoutBackpack
      possibleSets:
        - C27_NCRLightSet
        # #Misfits Removed - Med/Heavy moved behind blueprint crafting at armor workbench.
        #- C27_NCRMediumSet
        #- C27_NCRHeavySet

- type: entity
  id: C27BoSLoadoutKit
  name: C-27 Brotherhood Armor Selection Kit
  description: Select your chassis armor weight class. Brotherhood of Steel faction markings.
  parent: BaseC27LoadoutKit
  components:
    - type: UndecidedLoadoutBackpack
      possibleSets:
        - C27_BoSLightSet
        # #Misfits Removed - Med/Heavy moved behind blueprint crafting at armor workbench.
        #- C27_BoSMediumSet
        #- C27_BoSHeavySet

# --- CONCRETE TIER KIT ENTITIES (spawned when a set is selected from the UI) --
# Each spawns one outer-armor + one matching helmet for the chosen tier/faction.
# Generic tier kits
- type: entity
  id: KitC27_GenericLight
  name: generic light chassis kit
  description: Light C-27 chassis plating — maximizes mobility for scouts and flankers.
  parent: KitBase
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: rifleman
    - type: SpawnItemsOnUse
      items:
        - id: ClothingC27ArmorLightGeneric
        - id: ClothingC27HelmetLightGeneric
      sound:
        path: /Audio/Effects/unwrap.ogg

- type: entity
