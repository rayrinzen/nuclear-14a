- # ============================================================
# Misfits Add — M1 Garand family
# Ported from Fortune13 / LoneStar / desertrose-1 (SS13).
# All variants use the .308 clip (ClipMagazine308Rifle),
# and auto-eject with the iconic ping when the clip runs dry.
# Sources:
#   https://github.com/Cythisiax/LoneStar (base, Old Glory, Republic's Pride, SKS)
#   https://github.com/Cythisiax/desertrose-1 (Pawolski's Retribution, Republic's Demise)
# ============================================================
# Base M1 Garand — the WWII American classic.
type: entity
  name: M1 Garand
  parent: N14WeaponRifleBase
  id: N14WeaponRifleM1Garand
  description: The WWII American classic. A semi-automatic battle rifle fed by an 8-round en-bloc clip chambered in .308 Winchester. When the clip runs dry it pings out satisfyingly. Don't stick your thumb in it.
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/hunting.rsi # #Misfits Tweak: use hunting rifle RSI as back-slot placeholder — m1garand.rsi equipped-BACKPACK state eclipses the full character sprite
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Rifles/m1garand.rsi
    layers:
    - state: base
      map:
      - "enum.GunVisualLayers.Base"
    - state: mag-1
      map:
      - "enum.GunVisualLayers.Mag"
  - type: ChamberMagazineAmmoProvider
    autoEject: true
    # The iconic Garand ping when the en-bloc clip ejects on empty
    soundAutoEject:
      path: /Audio/_Nuclear14/Weapons/Guns/Rifles/N14WeaponM1Garand/garand_ping.ogg
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -56
  - type: Gun
    minAngle: 24
    maxAngle: 60
    angleIncrease: 4
    angleDecay: 16
    fireRate: 3
    soundGunshot:
      collection: N14GarandGunshot
      params:  # #Misfits Tweak — lower Garand gunshot volume; was too loud relative to other rifles
        volume: -4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: En-Bloc Clip
        startingItem: ClipMagazine308Rifle # #Misfits Change - replaced GarandEnbloc308 with shared .308 clip
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - N14Clip308Rifle
      gun_chamber:
        name: Chamber
        startingItem: N14Cartridge308Rifle
        priority: 1
        whitelist:
          tags:
            - N14Cartridge308Rifle
  - type: StaticPrice
    price: 350
