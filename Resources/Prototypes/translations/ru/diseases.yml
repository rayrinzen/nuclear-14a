- # #Misfits Add - Fallout wasteland disease prototypes.
# Eight diseases themed for the Nuclear-14 setting.
# Admin-spawn only; no natural spawning or vendor access.
# --- RAD FLU ---
# Common radiation sickness contracted near irradiated zones.
# Early stages: nausea, sneezing. Late stages: vomiting, damage.
type: disease
  id: RadFlu
  name: disease-rad-flu-name
  infectious: true
  airborne: true
  contactSpread: 0.3
  cureResist: 0.1
  tickTime: 3.0
  stages:
    - 30.0
    - 90.0
    - 180.0
  effects:
    - !type 
      probability: 0.15
      stages:
      - 0
      - 1
      emoteId: Sneeze
      airTransmit: true
    - !type 
      probability: 0.2
      stages:
      - 0
      - 1
      message: disease-rad-flu-popup-nausea
    - !type 
      probability: 0.1
      stages:
      - 1
      - 2
      key: Jitter
      duration: 4.0
    - !type 
      probability: 0.15
      stages:
      - 2
      - 3
      thirstAmount: '-30.0'
      hungerAmount: '-30.0'
    - !type 
      probability: 0.1
      stages:
      - 3
      damage:
        Radiation: 3
  cures:
    - !type 
      reagent: RadAway
      minAmount: 10.0
    - !type 
      maxDuration: 360.0
- # --- GHOUL ROT ---
# Necrotic infection spread by feral ghouls. Contact only.
# Causes tissue damage and slurred speech.
type: disease
  id: GhoulRot
  name: disease-ghoul-rot-name
  infectious: true
  airborne: false
  contactSpread: 0.4
  cureResist: 0.3
  tickTime: 4.0
  stages:
    - 40.0
    - 120.0
    - 240.0
  effects:
    - !type 
      probability: 0.2
      stages:
      - 0
      - 1
      message: disease-ghoul-rot-popup-itch
    - !type 
      probability: 0.15
      stages:
      - 1
      - 2
      key: SlurredSpeech
      duration: 8.0
    - !type 
      probability: 0.15
      stages:
      - 2
      - 3
      damage:
        Blunt: 2
        Cellular: 1
    - !type 
      probability: 0.1
      stages:
      - 1
      - 2
      - 3
