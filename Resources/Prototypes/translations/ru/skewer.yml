- # When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_single.yml
# Kebabs
type: entity
  name: skewer
  parent: BaseItem
  id: FoodKebabSkewer
  description: A thin rod of metal used to skewer just about anything and cook it.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/skewer.rsi
    state:
    layers:
    - state: skewer
    - map:
    - "foodSequenceLayers"
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type
          vertices:
            - '-0.40,-0.20'
            - '-0.30,-0.30'
            - 0.50,0.10
            - 0.40,0.20
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 6
  - type: ThrowingAngle
    angle: 245
  - type: EmbeddableProjectile
    offset: '-0.15,0.0'
  - type: MeleeWeapon
    wideAnimationRotation: -120
    damage:
      types:
        Piercing: 8
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tag
    tags:
    - Trash
    - Skewer
  - type: SolutionContainerManager
    solutions:
      food:
        canReact: false # Misfits Change: prevent reagent reactions when food elements are merged
        reagents:
        - ReagentId: Nutriment
          Quantity: 6
        - ReagentId: Vitamin
          Quantity: 2
  - type: FoodSequenceStartPoint # Misfits Change: allows food element entities (with key: Skewer) to be placed on the skewer and show sprites
    key: Skewer
    maxLayers: 4
    startPosition: '-0.27, -0.19'
    inverseLayers: true
    offset: 0.2, 0.1
    nameGeneration: food-sequence-skewer-gen
    contentSeparator: ", "
    allowHorizontalFlip: false
  - type: FoodMetamorphableByAdding # Misfits Change /Add/: let modular skewers resolve into named kebab results when their ingredient pattern matches.
    onlyFinal: false
- type: entity
  name: double rat kebab
  parent: FoodKebabSkewer
  id: FoodMeatRatdoubleKebab
  description: A double serving of not so delicious rat meat, on a stick.
  components:
  - type: Food
    trash:
    - FoodKebabSkewer
  - type: Sprite
    layers:
      - state: skewer
      - state: skewer-rat
      - map:  # Misfits Change /Fix/: preserve the dynamic skewer layer map so added ingredients update visuals.
      - "foodSequenceLayers"
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 12
        - ReagentId: Vitamin
          Quantity: 6
- type: entity
  name: fiesta kebab
  parent: FoodKebabSkewer
  id: FoodMeatFiestaKebab
  description: Always a cruise ship party somewhere in the world, right?
  components:
  - type: Food
    trash:
    - FoodKebabSkewer
  - type: Sprite
    layers:
      - state: skewer
      - state: skewer-pepper
      - state: skewer-corn
      - state: skewer-mushroom
      - state: skewer-tomato
      - map:  # Misfits Change /Fix/: preserve the dynamic skewer layer map so added ingredients update visuals.
      - "foodSequenceLayers"
- type: entity
  name: snake kebab
  parent: FoodKebabSkewer
  id: FoodMeatSnakeKebab
  description: Snake meat on a stick. It's a little tough.
  components:
  - type: Food
    trash:
    - FoodKebabSkewer
  - type: Sprite
    layers:
      - state: skewer
      - state: skewer-snake
      - map:  # Misfits Change: added layer map so dynamically added food elements display their sprites
      - "foodSequenceLayers"
  - type: SolutionContainerManager
    solutions:
      food:
        canReact: false # Dont want cause reactions inside skewers after merging ingredients
        maxVol: 0
  - type: FoodSequenceStartPoint
    key: Skewer
    maxLayers: 4
    startPosition: '-0.27, -0.19'
    inverseLayers: true
    offset: 0.2, 0.1
    nameGeneration: food-sequence-skewer-gen
    contentSeparator: ", "
    allowHorizontalFlip: false
