# Additional NCR armor variants to supplement the existing N14/Corvax NCR gear set.
# Adds a heavier frontline option (salvaged metal) and a dedicated medic vest that isn't in N14.
# Stats converted from SS13 (0-100 resistance) to SS14 coefficients: 1 - (ss13_value / 100).
# Sprites: TODO — source or create RSI files and place in _Misfits/Clothing/OuterClothing/Armor/.

- type: entity
  parent: N14FalloutArmorBase
  id: MisfitsClothingOuterNCRSalvagedMetalArmor
  name: NCR salvaged metal armor
  description: Pre-war metal armor repaired and re-issued to NCR heavy infantry. Durable if not elegant — the Republic takes what it can get after years of campaigning in the Mojave. Heavier than standard NCR vests.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncrsalvagedmetalarmor.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncrsalvagedmetalarmor.rsi
    - type: ClothingSpeedModifier
      walkModifier: 0.92
      sprintModifier: 0.92
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.55
          Slash: 0.60
          Piercing: 0.68
          Heat: 0.83
    - type: ExplosionResistance
      damageCoefficient: 0.78

- type: entity
  parent: N14FalloutArmorBase
  id: MisfitsClothingOuterNCRFieldMedicVest
  name: NCR field medic vest
  description: A reinforced NCR medic vest with a prominent red cross emblem. Relatively light armor — the medic needs to move quickly between fallen soldiers, and bulkier protection would just slow them down.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncrfieldmedicvest.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncrfieldmedicvest.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.82
          Slash: 0.82
          Piercing: 0.82
