# #Misfits Add - Invisible ghost-role spawner entities for pet companion traits.
# Each entity carries its own GhostRole + GhostRoleMobSpawner components
# so multiple pets can coexist without component conflicts on the player entity.

# Base invisible spawner — no sprite, no physics, just a ghost role host
- type: entity
  id: MisfitsPetSpawnerBase
  name: pet spawner
  abstract: true
  components:
    - type: Transform

# Dog companion spawner
- type: entity
  parent: MisfitsPetSpawnerBase
  id: MisfitsPetSpawnerDog
  name: companion dog spawner
  components:
    - type: GhostRole
      name: ghost-role-information-n14pet-dog-name
      description: ghost-role-information-n14pet-generic-description
      rules: ghost-role-component-default-rules
    - type: GhostRoleMobSpawner
      prototype: N14MobPetDog

