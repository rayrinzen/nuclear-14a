- type: entity
  name: microfusion cell
  description: A microfusion cell, typically used as ammunition for large energy weapons.
  id: N14BasePowerCell
  abstract: true
  parent: BaseItem
  components:
    - type: Battery
      pricePerJoule: 0.015
    - type: Explosive
      #Misfits Change - use the structural-capable N14 explosion profile.
      explosionType: N14DefaultStructural
      maxIntensity: 200
      intensitySlope: 1.5
    - type: Tag
      tags:
        - N14MicrofusionCell
        - N14AmmoCell
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
    - type: SolutionContainerManager
      solutions:
        battery:
          maxVol: 5
    - type: InjectableSolution
      solution: battery
    - type: DrawableSolution
      solution: battery
    - type: Extractable
      juiceSolution:
        reagents:
          - ReagentId: Zinc
            Quantity: 5
    - type: Appearance
    - type: PowerCellVisuals
    - type: Riggable
    # - type: Craftable  # #Misfits Remove: Stalker14 crafting system
    - type: HitscanBatteryAmmoProvider
      proto: N14MFLaserRed
      fireCost: 50

#MARK: Microfusion Cell — single consolidated type
# #Misfits Change - Consolidated from 4 colored variants into one generic MFC.
# Weapons now control their own beam color and damage via GunDamageBonusComponent.hitscanProtoOverride.
# The cell just provides charge. Default fallback hitscan is Red (used if no override on gun).
- type: entity
  name: microfusion cell
  description: A standard microfusion cell used as ammunition for energy weapons. The weapon's internal optics determine beam color and output — the cell simply provides charge.
  id: N14MicrofusionCell
  suffix: Full
  parent: N14BasePowerCell
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
      layers:
        - map: [ "enum.PowerCellVisualLayers.Base" ]
          state: empty
        - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
          state: o2
          shader: unshaded
    - type: Battery
      maxCharge: 1200
      startingCharge: 1200
    - type: HitscanBatteryAmmoProvider
      proto: N14MFLaserRed
      fireCost: 50

# Backward-compatible aliases — colored variants redirect to the single generic MFC.
# Kept so existing map files, kits, crates, and trade references continue to work.
- type: entity
  id: N14MicrofusionCellRed
  parent: N14MicrofusionCell
  suffix: Full

- type: entity
  id: N14MicrofusionCellGreen
  parent: N14MicrofusionCell
  suffix: Full

- type: entity
  id: N14MicrofusionCellBlue
  parent: N14MicrofusionCell
  suffix: Full

- type: entity
  id: N14MicrofusionCellViolet
  parent: N14MicrofusionCell
  suffix: Full

#MARK: Fusion Core — single consolidated type
# #Misfits Change - Consolidated from 4 colored variants into one generic fusion core.
# Only the Laser Gatling accepts these (N14FusionCore tag). Weapon controls beam via override.
# 5000 charge / 50 fireCost = 100 shots. Intended for heavy sustained-fire weapons.
- type: entity
  name: fusion core
  description: A heavy fusion core containing concentrated fusion fuel. Provides massive charge reserves for heavy energy weapons. Beam characteristics are determined by the weapon's optics.
  id: N14FusionCore
  suffix: Full
  parent: N14BasePowerCell
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/fusion.rsi
      layers:
        - map: [ "enum.PowerCellVisualLayers.Base" ]
          state: empty
        - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
          state: o2
          shader: unshaded
    - type: Tag
      tags:
        - N14FusionCore
        - N14AmmoCell
    - type: Item
      size: Normal
    - type: Battery
      maxCharge: 5000
      startingCharge: 5000
    - type: HitscanBatteryAmmoProvider
      proto: N14MFLaserRed
      fireCost: 50

# Backward-compatible aliases for colored fusion cores.
- type: entity
  id: N14FusionCoreRed
  parent: N14FusionCore
  suffix: Full

- type: entity
  id: N14FusionCoreGreen
  parent: N14FusionCore
  suffix: Full

- type: entity
  id: N14FusionCoreBlue
  parent: N14FusionCore
  suffix: Full

- type: entity
  id: N14FusionCoreViolet
  parent: N14FusionCore
  suffix: Full

#MARK: Electron Charge Pack — single consolidated type
# #Misfits Change - Consolidated from 4 colored variants into one generic ECP.
# Weapons control their own pulse beam via GunDamageBonusComponent.hitscanProtoOverride.
# Pulse weapons deal Heat + Shock damage (effective against mechanical targets).
- type: entity
  name: electron charge pack
  description: An electron charge pack used as ammunition for pulse weapons. The weapon's emitter array determines pulse characteristics — the pack simply provides charge.
  id: N14ElectronChargePack
  suffix: Full
  parent: N14BasePowerCell
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/ECP.rsi
      layers:
        - map: [ "enum.PowerCellVisualLayers.Base" ]
          state: empty
          scale: 0.5, 0.5
        - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
          state: o2
          scale: 0.5, 0.5
          shader: unshaded
    - type: Tag
      tags:
        - N14ElectronChargePack
        - N14AmmoCell
    - type: Battery
      maxCharge: 1200
      startingCharge: 1200
    - type: HitscanBatteryAmmoProvider
      proto: N14PulseRed
      fireCost: 50

# Backward-compatible aliases for colored ECPs.
- type: entity
  id: N14ElectronChargePackRed
  parent: N14ElectronChargePack
  suffix: Full

- type: entity
  id: N14ElectronChargePackGreen
  parent: N14ElectronChargePack
  suffix: Full

- type: entity
  id: N14ElectronChargePackBlue
  parent: N14ElectronChargePack
  suffix: Full

- type: entity
  id: N14ElectronChargePackViolet
  parent: N14ElectronChargePack
  suffix: Full

