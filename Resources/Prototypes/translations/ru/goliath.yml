- type: htnCompound
  id: GoliathCompound
  branches:
    - 
    tasks:
        - !type 
          task: GoliathMeleeCombatPrecondition
    - 
    tasks:
        - !type 
          task: IdleCompound
- type: htnCompound
  id: GoliathMeleeCombatPrecondition
  branches:
    - 
    preconditions:
        - !type 
          isBuckled: true
      tasks:
        - !type 
          operator: !type
            shutdownState: TaskFinished
    - 
    preconditions:
        - !type 
          isInContainer: true
      tasks:
        - !type 
          task: EscapeCompound
    - 
    preconditions:
        - !type 
          isPulled: true
      tasks:
        - !type 
          operator: !type
            shutdownState: TaskFinished
    - 
    tasks:
        - !type 
          operator: !type
            proto: NearbyMeleeTargets
        - !type 
          task: GoliathAttackTargetCompound
- type: htnCompound
  id: GoliathAttackTargetCompound
  branches:
    - 
    preconditions:
        - !type 
          key: Target
      tasks:
        - !type 
          operator: !type
            shutdownState: PlanFinished
            pathfindInPlanning: true
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            rangeKey: MeleeRange
        - !type 
          operator: !type
            jukeType: AdjacentTile
        - !type 
          operator: !type
            targetKey: Target
          preconditions:
            - !type 
              key: Target
            - !type 
              targetKey: Target
              rangeKey: MeleeRange
          services:
            - !type 
              id: MeleeService
              proto: NearbyMeleeTargets
              key: Target
