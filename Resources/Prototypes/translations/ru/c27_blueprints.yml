# #Misfits Add - C-27 Armor Blueprint items.
#
# Three faction-keyed blueprints. When a blueprint is dropped into an armor
# workbench's storage, the workbench's lathe UI exposes four new crafting
# recipes: Medium armor, Medium helmet, Heavy armor, Heavy helmet, all for the
# matching faction variant (Generic / NCR / BoS).
#
# Light-tier plating is still delivered at spawn via C27NCRLoadoutKit /
# C27BoSLoadoutKit. The Generic variant now spawns with no armor at all, so
# obtaining any Generic-variant plating requires the Generic blueprint.
#
# Entity prototypes used as `result` on the recipes:
#   ClothingC27ArmorMediumGeneric / ClothingC27HelmetMediumGeneric
#   ClothingC27ArmorHeavyGeneric  / ClothingC27HelmetHeavyGeneric
#   ClothingC27ArmorMediumNCR     / ClothingC27HelmetMediumNCR
#   ClothingC27ArmorHeavyNCR      / ClothingC27HelmetHeavyNCR
#   ClothingC27ArmorMediumBoS     / ClothingC27HelmetMediumBoS
#   ClothingC27ArmorHeavyBoS      / ClothingC27HelmetHeavyBoS

- type: entity
  parent: N14BlueprintBase
  id: N14BlueprintC27ArmorGeneric
  name: C-27 Armor Blueprint
  description: Factory manufacturing schematics for reinforced C-27 chassis plating. Covers medium and heavy chassis armor and the matching helmets in plain (Generic) livery.
  components:
    - type: Blueprint
      recipes:
        - N14BPC27ArmorMediumGeneric
        - N14BPC27HelmetMediumGeneric
        - N14BPC27ArmorHeavyGeneric
        - N14BPC27HelmetHeavyGeneric

- type: entity
  parent: N14BlueprintBase
  id: N14BlueprintC27ArmorNCR
  name: NCR C-27 Armor Blueprint
  description: NCR-issued manufacturing schematics for reinforced C-27 chassis plating. Covers medium and heavy chassis armor and the matching helmets in New California Republic livery.
  components:
    - type: Blueprint
      recipes:
        - N14BPC27ArmorMediumNCR
        - N14BPC27HelmetMediumNCR
        - N14BPC27ArmorHeavyNCR
        - N14BPC27HelmetHeavyNCR

- type: entity
  parent: N14BlueprintBase
  id: N14BlueprintC27ArmorBoS
  name: Brotherhood C-27 Armor Blueprint
  description: Brotherhood of Steel manufacturing schematics for reinforced C-27 chassis plating. Covers medium and heavy chassis armor and the matching helmets in Brotherhood livery.
  components:
    - type: Blueprint
      recipes:
        - N14BPC27ArmorMediumBoS
        - N14BPC27HelmetMediumBoS
        - N14BPC27ArmorHeavyBoS
        - N14BPC27HelmetHeavyBoS
