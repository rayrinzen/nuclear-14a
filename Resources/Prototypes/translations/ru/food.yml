- # #Misfits Fix - N14 meats use N14UncookedAnimalProteinsRad, not upstream UncookedAnimalProteins;
# upstream CreateMeatball never fires. This reaction uses the correct N14 reagent and targets
# the upstream FoodMeatMeatball entity which already exists.
type: reaction
  id: N14CreateMeatball
  impact: Low
  quantized: true
  conserveEnergy: false
  reactants:
    N14UncookedAnimalProteinsRad:
      amount: 5
    Egg:
      amount: 6
  effects:
    - !type 
      entity: FoodMeatMeatball
