- # Picks a random location for the NPC to move to and idle.
type: htnCompound
  id: IdleCompound
  branches:
    - 
    # Pick a new spot and wait there.
    preconditions:
        - !type 
          isBuckled: false
        - !type 
          isPulled: false
      tasks:
        - !type 
          operator: !type
            rangeKey: IdleRange
        - !type 
          operator: !type
            pathfindInPlanning: false
        - !type 
          operator: !type
            targetKey: IdleTime
            minKey: MinimumIdleTime
            maxKey: MaximumIdleTime
        - !type 
          operator: !type
            key: IdleTime
          preconditions:
            - !type 
              key: IdleTime
- # Spin to a random rotation and idle.
type: htnCompound
  id: IdleSpinCompound
  branches:
    - 
    tasks:
        - !type 
          operator: !type
            key: IdleTime
          preconditions:
            - !type 
              key: IdleTime
    - 
    # Pick a new angle and spin there
    tasks:
        - !type 
          operator: !type
            targetKey: RotateTarget
        - !type 
          operator: !type
            targetKey: RotateTarget
        - !type 
          operator: !type
            targetKey: IdleTime
            minKey: MinimumIdleTime
            maxKey: MaximumIdleTime
        - !type 
          operator: !type
            key: IdleTime
          preconditions:
            - !type 
              key: IdleTime
