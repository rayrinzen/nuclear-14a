# Misfits — Rank-tier outer armor overrides.
#
# Each faction (NCR / Legion / BoS) uses a flat 7-tier armor progression so
# that equivalent ranks have identical effective protection regardless of
# faction. Tiers use 0.05 coefficient steps from T2 to T7:
#
#   T2  0.85/0.80  basic combatant
#   T3  0.80/0.75  veteran soldier
#   T4  0.75/0.70  experienced line fighter / Knight entry
#   T5  0.70/0.65  NCO entry (Sergeant / Decanus / Senior Knight)
#   T6  0.65/0.60  senior NCO
#   T7  0.60/0.55  top enlisted NCO
#
# All entities inherit sprites from their faction parent and override only
# the ArmorComponent and ExplosionResistance so that visual identity is
# preserved while protection values are balanced.

# ---------------------------------------------------------------------------
# NCR
# ---------------------------------------------------------------------------
# T2 — NCR Officer Coat
- type: entity
  parent: N14ClothingOuterNCRTrenchCoat
  id: MisfitsClothingOuterNCRTrenchCoat
  name: NCR officer trench coat
  description: Rugged and dependable, this well worn leather coat is used by officers of the Salt Dogs to brave the frontier.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncr_officer_coat.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/OuterClothing/Armor/ncr_officer_coat.rsi

# T3 — NCR Private First Class
- type: entity
  parent: N14ClothingOuterNCRVestDesert
  id: MisfitsNCREnhancedVest
  name: NCR reinforced vest
  description: A reinforced desert vest issued to seasoned NCR soldiers with a track record in the field.
  components:
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.80
          Slash: 0.80
          Piercing: 0.75
          Heat: 0.75
      priceMultiplier: 0.6
    - type: ExplosionResistance
      damageCoefficient: 0.85

# T4 — NCR Specialist (pouched vest variant — retains utility storage)
- type: entity
