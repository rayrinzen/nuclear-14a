- type: constructionGraph
  id: N14Bed
  start: start
  graph:
    - node: start
      actions:
        - !type ':DestroyEntity {}'
      edges:
        - to: bed
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: Steel
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 6
              doAfter: 2
        - to: bedwood
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 6
              doAfter: 2
        -         # start Misfits change
to: bedwoodbunk
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 1
            - material: Cloth
              amount: 6
              doAfter: 2
        -         # end Misfits change
to: bedroll
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: Cloth
              amount: 3
              doAfter: 2
        - to: mattress
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: Cloth
              amount: 6
              doAfter: 2
    - node: bed
      entity: N14Bed
      edges:
        - to: start
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 2
            - !type 
              prototype: MaterialCloth1
              amount: 6
          steps:
            - tool: Screwing
              doAfter: 1
    - node: bedwood
      entity: N14BedWood
      edges:
        - to: start
          completed:
            - !type 
              prototype: MaterialWoodPlank1
              amount: 2
            - !type 
              prototype: MaterialCloth1
              amount: 6
          steps:
            - tool: Screwing
              doAfter: 2
    -     #start Misfits change
node: bedwoodbunk
      entity: N14BedWoodBunk
      edges:
        - to: start
          completed:
            - !type 
              prototype: MaterialWoodPlank1
              amount: 2
            - !type 
              prototype: MaterialCloth1
              amount: 6
          steps:
            - tool: Screwing
              doAfter: 2
    -     #end Misfits change
node: medicalbed
      entity: MedicalBed
      edges:
        - to: start
          completed:
            - !type 
              prototype: SheetPlasteel1
              amount: 2
            - !type 
              prototype: MaterialDurathread1
              amount: 2
          steps:
            - tool: Screwing
              doAfter: 1
    - node: bedroll
      entity: N14Bedroll
      edges:
        - to: start
          completed:
            - !type 
              prototype: MaterialCloth1
              amount: 3
          steps:
            - tool: Slicing
              doAfter: 1
    - node: mattress
      entity: N14BedMattress0
      edges:
        - to: start
          completed:
            - !type 
              prototype: MaterialCloth1
              amount: 6
          steps:
            - tool: Cutting
              doAfter: 2
