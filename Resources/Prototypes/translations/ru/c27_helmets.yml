- type: entity
  parent: BaseC27HelmetMedium
  id: ClothingC27HelmetMediumBoS
  name: c-27 medium helmet (brotherhood issue)
  description: Brotherhood of Steel reinforced helmet for C-27 knights. Brotherhood blue with riveted steel plating.
  components:
