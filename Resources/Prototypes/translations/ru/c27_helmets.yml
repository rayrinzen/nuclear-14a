# === Concrete: Heavy tier ===
- type: entity
  parent: BaseC27HelmetHeavy
  id: ClothingC27HelmetHeavyGeneric
  name: c-27 heavy helmet
  description: Composite ablative dome with full-face visor and integrated optics. Built for paired-pairing with the heavy chassis plating.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/Head/Helmets/c27_heavy_generic.rsi
    - type: Clothing
