# #Misfits Add - C-27 humanoid robot helmets: 3 tiers × 3 factions = 9 concrete entities.
# Gated by MisfitsC27ArmorComponent (Phase D species check) — the c27 inventory template HEAD
# slot has no tag whitelist, so the species gate is the only barrier. Helmets are equipped
# separately (not bundled into the heavy armor's ToggleableClothing) so players can mix tiers
# / faction skins for visual variety.

# === Abstract bases ===
- type: entity
  abstract: true
  parent: ClothingHeadBase
  id: BaseC27Helmet
  components:
    - type: MisfitsC27Armor
    - type: Tag
      tags:
        - HidesHair

- type: entity
  abstract: true
  parent: BaseC27Helmet
  id: BaseC27HelmetLight
  components:
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.90
          Slash: 0.90
          Piercing: 0.85
          Heat: 0.95

- type: entity
  abstract: true
  parent: BaseC27Helmet
  id: BaseC27HelmetMedium
  components:
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.80
          Slash: 0.80
          Piercing: 0.80
          Heat: 0.85

- type: entity
  abstract: true
  parent: BaseC27Helmet
  id: BaseC27HelmetHeavy
  components:
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.70
          Slash: 0.70
          Piercing: 0.70
          Heat: 0.80
          Caustic: 0.85
          Radiation: 0.75
    - type: EyeProtection
    - type: ExplosionResistance
      damageCoefficient: 0.7

# === Concrete: Light tier ===
- type: entity
  parent: BaseC27HelmetLight
  id: ClothingC27HelmetLightGeneric
  name: c-27 light helmet
  description: A basic factory-issue helmet for C-27 chassis. Open visor, easy to swap.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_generic.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_generic.rsi

- type: entity
  parent: BaseC27HelmetLight
  id: ClothingC27HelmetLightNCR
  name: c-27 light helmet (ncr issue)
  description: NCR-issued light helmet for C-27 conscripts. Painted in republic khaki.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_ncr.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_ncr.rsi

- type: entity
  parent: BaseC27HelmetLight
  id: ClothingC27HelmetLightBoS
  name: c-27 light helmet (brotherhood issue)
  description: Brotherhood of Steel light helmet for C-27 auxiliaries. Brotherhood blue with chrome accents.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_bos.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/Head/Helmets/c27_light_bos.rsi

