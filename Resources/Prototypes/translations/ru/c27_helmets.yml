  name: c-27 heavy helmet (ncr issue)
  description: NCR-issued heavy composite helmet for C-27 heavy troopers. Republic gold-and-khaki paint over a sealed dome.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/Head/Helmets/c27_heavy_ncr.rsi
