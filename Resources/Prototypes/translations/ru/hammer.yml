- type: entity
  name: sledgehammer
  parent: BaseItem
  id: N14SledgeHammer
  description: A robust sledgehammer that requires considerable strength to be wielded.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/sledgehammer.rsi
      state: icon
    - type: MeleeWeapon
      wideAnimationRotation: -135
      attackRate: 1.35
      damage:
        types:
          Blunt: 15
    - type: Wieldable
    - type: IncreaseDamageOnWield
      damage:
        types:
          Blunt: 45
          Structural: 60 #This is for utility and resource harvesting! -Bill
    - type: Item
      size: Large
    - type: Clothing
      sprite: _Nuclear14/Objects/Weapons/Melee/sledgehammer.rsi
      quickEquip: false
      slots:
        - back
        - suitStorage
        # - type: Tool
        # qualities:
        # - Crushing
        # useSound:
        # path: /Audio/Items/eating_2.ogg # TODO: Crushing noise
    - type: StaticPrice
      price: 60

- type: entity
  name: super sledgehammer
  parent: N14SledgeHammer
  id: N14SuperSledgeHammer
  description: A bigger, heavier, and more destructive sledgehammer. You really need some strong arms to swing it.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/supersledge.rsi
      state: icon
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 15
    - type: Wieldable
    - type: IncreaseDamageOnWield
      damage:
        types:
          Blunt: 75
          Structural: 35
    - type: MeleeThrowOnHit
      speed: 10
      lifetime: 0.025
    - type: Item
      size: Large
    - type: Clothing
      sprite: _Nuclear14/Objects/Weapons/Melee/supersledge.rsi
      quickEquip: false
      slots:
        - back
        - suitStorage
    - type: StaticPrice
      price: 100

