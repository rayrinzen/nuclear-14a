- type: entity
  name: tribal decorated heavy club
  parent: N14SledgeHammer
  id: N14TribalBigClubDecorated
  description: A big and heavy tribal hammer that requires considerable strength to be wielded, animal teeth have been added to this one.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/tribaljaggedbigclub.rsi
      state: icon
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 10
          Slash: 10
    - type: Wieldable
    - type: IncreaseDamageOnWield
      damage:
        types:
          Blunt: 30 # #Misfits Tweak - cap wield bonus to prevent near-1-crit on Glowing Ghoul (90 crit, 1.1x modifier; max safe raw = 70)
          Piercing: 15
          Slash: 15
          Structural: 30
    - type: Clothing
      sprite: _Nuclear14/Objects/Weapons/Melee/tribaljaggedbigclub.rsi
      quickEquip: false
      slots:
        - back
        - suitStorage
    - type: StaticPrice
      price: 60

