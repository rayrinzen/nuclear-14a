- # Selects a random pathfind point and tries to move there.
type: htnCompound
  id: MoveToPathfindPointCompound
  branches:
    - 
    tasks:
        - !type 
          operator: !type :PickPathfindPointOperator
        - !type 
          operator: !type
            pathfindInPlanning: false
- type: entity
  id: MobPathfindDummy
  name: pathfind dummy
  suffix: NPC
  parent: MobXenoRouny
  components:
  - type: HTN
    rootTask:
      task: MoveToPathfindPointCompound
