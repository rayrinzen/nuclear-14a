- # #Misfits Add - NCR Ranger Recruit: brand-new entry-level Rangers role at the Bonneville station.
# No faction timelock — this is the starter rung of the NCR Rangers ladder.
type: job
  id: NCRRangerRecruit
  setPreference: true
  alwaysUseSpawner: true
  jobWhitelistBypassesRoleTimers: true
  name: job-name-ncr-ranger-recruit
  description: job-description-ncr-ranger-recruit
  playTimeTracker: NCRRangerRecruit
  weight: 4 # #Misfits Tweak - bottom of Rangers ladder
  startingGear: NCRRangerRecruitGear
  icon: "JobIconSecurityCadet"
  supervisors: job-supervisors-ncr-ranger-recruit
  canBeAntag: false
  access:
  - NCR
  - NCRRanger
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - Rangers
  requirements:
    - !type 
      min: 43200 # 12 hours
    - !type 
      inverted: true
      species:
      - RobotMrHandy
      - RobotProtectron
      - RobotProtectronPolice
      - RobotProtectronBuilder
      - RobotProtectronFire
      - RobotMrGutsy
      - RobotAssaultron
      - RobotAssaultronTesla
      - RobotSentryBot
      - RobotSentryBotLaser
      - RobotRobobrain
      - RobotRobobrainLaser
      - SuperMutant
      - GhoulGlowing
- type: startingGear
  id: NCRRangerRecruitGear
  # Entry-level gear: standard ranger hat, NCR uniform, basic boots, revolver belt, recruit badge
  equipment:
    head: N14ClothingHeadHatRanger
    back: N14ClothingBackpackMilitary
    jumpsuit: N14ClothingUniformRangerV1
    ears: N14ClothingHeadsetNCR
    shoes: N14ClothingBootsLeather
    belt: ClothingBeltRevolverdesertfilled
    pocket1: MagazineBox45-70
    outerClothing: N14ClothingOuterNCRCombatArmor
    id: N14IDBadgeNCRDesertRangerRecruit
  innerClothingSkirt: N14ClothingUniformRangerV1
  satchel: N14ClothingBackpackSatchelMilitaryFilled
  duffelbag: N14ClothingBackpackDuffelMilitaryFilled
  storage:
    back:
    - N14BoxPlasticFilledMilitary
    - FlashlightSeclite
- type: playTimeTracker
  id: NCRRangerRecruit
