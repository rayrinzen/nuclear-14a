# Named raider faction armors — ported from SS13 Big-Iron / desertrose-1 reference repos.
# These represent the distinct named raider gangs of the Mojave Wasteland (Fallout: New Vegas).
# Unlike generic raider gear, each faction has a recognisable aesthetic and specialisation.
# Stats converted from SS13 (0-100 resistance) to SS14 coefficients: 1 - (ss13_value / 100).
