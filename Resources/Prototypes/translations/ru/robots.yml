- type: entity
  id: N14SentryBotOverloadLightEmitter
  name: sentry bot overload light emitter
  description: A hidden helper entity for the sentry bot's overload warning lights.
  save: false
  components:
  - type: PointLight
    enabled: false
    color: red
    radius: 5
    softness: 2
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
- # Misfits Change /Fix: netsync must be enabled so clients can see the light toggle during overload flash.
# Misfits Change /Add: Sentry Bot - hostile NPC with twin gatling lasers, high HP, and armor
type: entity
  parent: N14MobRobotHostile
  id: N14MobRobotSentryBot
  name: Sentry Bot
  description: A pre-war military robot armed with a gatling laser and covered in thick armor plating. A terrifying relic of humanity's last war.
  suffix: hostile, gatling laser
  components:
  - type: IdleSound #Misfits Change - use the dedicated Sentry Bot idle loop set
  - type: SpamEmitSound #Misfits Change - periodic Sentry Bot mechanical chatter
    minInterval: 12
    maxInterval: 40
    sound:
      collection: N14SentryIdle
      params:
        volume: -6
        maxDistance: 7
  - type: AggroSound #Misfits Change - separate aggro alert on combat entry
    sound:
      collection: N14SentryAttack
      params:
        volume: -3
        maxDistance: 12
  - type: MovementSpeedModifier
    # Misfits Tweak: reduced further — sentry bots are heavy siege walkers, not pursuit units.
    baseWalkSpeed: 0.75
    baseSprintSpeed: 1.2
  -   # Misfits Change /Add: Prevent players from dragging this robot around.
  # At 350 HP and covered in combat plating it is far too heavy to be moved.
type: NoPull
  - type: MobThresholds
    thresholds:
      0: Alive
      350: Dead
    stateAlertDict:
      Alive: BorgHealth
      Dead: HumanDead
  - type: Damageable
    damageContainer: Biological
    # Hardened military armor - resistant to physical and burn damage
    damageModifierSet: N14HeavyRobot
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/sentrybot.rsi
    # Misfits Change /Tweak: Scale up 2× so the sentry bot looks imposingly large on screen.
    scale: 2.0, 2.0
    layers:
    - state: icon
      map:
      - "movement"
    -     # Misfits Change /Tweak: Use inhand-right (4-directional) so the gatling laser rotates with
    # the bot's facing direction and looks like it is actively being wielded.
sprite: _Nuclear14/Objects/Weapons/Guns/Battery/laser_gatling.rsi
      state: inhand-right
