- # parent to MobSiliconBase
type: entity
  abstract: true
  parent: MobSiliconBase
  id: N14MobRobotHostile
  suffix: hostile npc
  name: robot
  description: Designed to serve humankind. Maybe it ended it.
  components:
  - type: InputMover
  - type: MobMover
  - type: NpcFactionMember
    factions:
    - HostileRobot
  -   #- type: MobRobotAggro #Misfits Change — removed: NPC hostile robots should be hostile to player robots, not neutral.
type: ProximityNPC # Misfits Add — sleep distant NPCs to reduce tick load
  - type: HTN
    rootTask:
      task: N14HostileCompound
    blackboard:
      NavSmash: !type ':Bool true'
  - type: Sprite
    drawdepth: Mobs
  - type: Physics
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 6
  - type: Fixtures
    fixtures:
      fix1:
        shape: '!type:PhysShapeCircle radius: 0.4'
        density: 150
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobState
    allowedStates:
      - Alive
      - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
    stateAlertDict:
      Alive: BorgHealth
      Dead: HumanDead
  - type: Stamina
    critThreshold: 20
  - type: MovementAlwaysTouching
  - type: Appearance
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  -   # - type: Bloodstream
  # bloodMaxVolume: 50
type: CombatMode
  -   # - type: GhostTakeoverAvailable
  # - type: GhostRole
  # prob: 0.33
  # makeSentient: true
  # name: hostile attacker # wave defence
  # description: |
  # Wreak havoc and kill all humans!
type: ReplacementAccent
    accent: genericAggressive
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: WastelandAnimal
  - type: Puller
    needsHands: true
  - type: Grammar # Misfits Change - proper noun so names appear capitalized in says/emotes when possessed
    attributes:
      proper: true
  - type: TypingIndicator
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Destructible
    thresholds:
    - trigger: '!type:DamageTrigger damage: 100 behaviors: - !type:SpawnEntitiesBehavior spawn: N14ScrapElectronic1: min: 1 max: 3 N14MaterialCircuitry1: min: 1 max: 3 N14Scrap1: min: 1 max: 3 N14CurrencyPrewar: min: 5 max: 25 - !type:PlaySoundBehavior sound: path: /Audio/Machines/AI/borg_death.ogg - !type:DoActsBehavior acts: [ "Destruction" ]' # Misfits Change - robot death sound
  - type: Tag #Misfits Change - robot footstep sounds
    tags:
    - DoorBumpOpener
    - FootstepSound
    - SiliconEmotes
  - type: Deathgasp #Misfits Change - keep robot death emotes consistent with silicon mobs
    prototype: SiliconDeathgasp
    needsCritical: false
  - type: Vocal #Misfits Change - generic fallback emotes for robots without a dedicated sound set
    sounds:
      Unsexed: UnisexSilicon
- # TODO: Make them shout things at people using advertise.
type: entity
  abstract: true
  parent: N14MobRobotHostile
  id: N14MobRobotHostileMelee
  components:
  - type: MeleeWeapon
    hidden: true
    soundHit:
        path: /Audio/Effects/metal_thud1.ogg
    angle: 0
    animation: WeaponArcPunch
    damage:
      groups:
        Brute: 5
- type: entity
  parent: N14MobRobotHostileMelee
  id: N14MobRobotAssaultronHostile
  name: Assaultron
  description: Horrifying. Fast. Deadly.
  components:
  - type: IdleSound #Misfits Change - use the dedicated Assaultron idle loop set
  - type: SpamEmitSound #Misfits Change - periodic Assaultron idle chatter
    minInterval: 10
    maxInterval: 35
    sound:
      collection: N14AssaultronIdle
      params:
        volume: -6
        maxDistance: 7
  - type: HTN
    rootTask:
      task: N14RangedHostileCompound
    blackboard:
      NavClimb: !type ':Bool true'
      NavSmash: !type ':Bool true'
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead # Corvax-Change
  - type: Destructible
    thresholds:
    - trigger: '!type:DamageTrigger damage: 200 behaviors: - !type:SpawnEntitiesBehavior spawn: N14ScrapElectronic1: min: 1 max: 3 N14MaterialCircuitry1: min: 1 max: 3 N14Scrap1: min: 1 max: 3 N14CurrencyPrewar: min: 5 max: 25 - !type:PlaySoundBehavior sound: path: /Audio/Machines/AI/borg_death.ogg - !type:DoActsBehavior acts: [ "Destruction" ]' # Misfits Change - robot death sound
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 6
  - type: MeleeWeapon #Misfits Change - replace generic clangs with Assaultron attack vocals
    hidden: true
    soundHit:
      collection: N14AssaultronAttack
    angle: 0
    animation: WeaponArcPunch
    damage:
      types:
        Slash: 15 #Misfits Tweak - tone down NPC assaultron claw lethality per balance request
  -   # - type: GhostRole
  # prob: 1
  # makeSentient: true
  # name: Assaultron
  # description: |
  # Protect your area and remove any trespassers.
type: Sprite
    sprite: _Nuclear14/Mobs/Robots/assaultron.rsi
    layers:
    - state: icon
      map:
      - "movement"
    -     # - state: icon
    # map: [ "enum.DamageStateVisualLayers.Base" ]
state: icon # change me
      map:
      - "enum.BorgVisualLayers.Light"
      shader: unshaded
      visible: false
    - state: icon # change me
      shader: unshaded
      map:
      - "light"
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: DamageStateVisuals
    states:
      Alive:
        Base: deathclaw
      Dead:
        Base: dead
  - type: AggroSound #Misfits Change
    sound:
      collection: N14AssaultronAttack
      params:
        volume: -3
        maxDistance: 12
