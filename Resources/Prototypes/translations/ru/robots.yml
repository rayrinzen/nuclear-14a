    states:
      Alive:
        Base: icon
      Dead:
        Base: dead
  - type: SentryBotOverloadLight
    steadyLightEnabled: true
    flashInterval: 0.35
  -   # Misfits Change /Fix: PointLight required on the main entity so SentryBotOverloadLightSystem's
  # Update() query (which requires both SentryBotOverloadLightComponent and PointLightComponent)
  # runs correctly and drives the overload flash animation.
type: PointLight
    enabled: false
    radius: 0
    softness: 0
  -   # Single gatling laser sprite, but still uses the same combat profile and hitscan path.
type: Gun
    minAngle: 2
    maxAngle: 12
    angleIncrease: 4
    angleDecay: 12
    # Misfits Tweak: reduced from 8 → 6 shots/sec to be slightly less overwhelming.
    fireRate: 6
    soundGunshot:
      collection: N14LaserGatlingGunshot
    useKey: false
    selectedMode: FullAuto
    availableModes:
      - FullAuto
  - type: HitscanBatteryAmmoProvider
    proto: RedLaser
    fireCost: 50
  - type: Battery
    # Misfits Change /Tweak: Extremely large charge pool — effectively infinite ammo.
    maxCharge: 9999999
    startingCharge: 9999999
  -   # Misfits Change /Add: Melee stomp/ram attack used by N14RangedHostileCompound as a fallback
  # when the gatling laser battery is depleted (HTN tries ranged first, then melee).
  # Misfits Change /Tweak: bumped to 40 brute, extended reach, added knockback like power armor.
type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/metal_thud1.ogg
    angle: 0
    animation: WeaponArcPunch
    range: 1.5
    attackRate: 0.75
    damage:
      groups:
        Brute: 40
  - type: MeleeThrowOnHit
    speed: 10
    lifetime: 0.025
  - type: HTN
    rootTask:
      task: N14RangedHostileCompound
    blackboard:
      NavSmash: !type ':Bool true'
      NavClimb: !type ':Bool true'
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
