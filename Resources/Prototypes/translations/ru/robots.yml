- # Misfits Change /Add: Ballistic Sentry Bot - same chassis as the laser variant but armed with a
# 5mm minigun instead of a gatling laser. Once the drum empties the HTN falls back to a heavy stomp.
# Parented from N14MobRobotHostile (not the laser variant) to avoid conflicting ammo providers.
type: entity
  parent: N14MobRobotHostile
  id: N14MobRobotSentryBotBallistic
  name: Sentry Bot
  description: A pre-war military robot armed with a 5mm minigun and covered in thick armor plating. A terrifying relic of humanity's last war.
  suffix: hostile, minigun
  components:
  - type: IdleSound #Misfits Change /Add - reuse Sentry Bot idle loop set on ballistic variant
  - type: SpamEmitSound
    minInterval: 12
    maxInterval: 40
    sound:
      collection: N14SentryIdle
      params:
        volume: -6
        maxDistance: 7
  - type: AggroSound #Misfits Change /Add - same aggro alert as laser variant
    sound:
      collection: N14SentryAttack
      params:
        volume: -3
        maxDistance: 12
  - type: MovementSpeedModifier
    # Misfits Tweak: reduced further — sentry bots are heavy siege walkers, not pursuit units.
    baseWalkSpeed: 0.75
    baseSprintSpeed: 1.2
  -   # Misfits Change /Add: Prevent players from dragging this robot around.
type: NoPull
  - type: MobThresholds
    thresholds:
      0: Alive
      350: Dead
    stateAlertDict:
      Alive: BorgHealth
      Dead: HumanDead
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: N14HeavyRobot
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/sentrybot.rsi
    # Misfits Change /Add: Same 2x scale as the laser variant.
    scale: 2.0, 2.0
    layers:
    - state: icon
      map:
      - "movement"
    -     # Misfits Change /Tweak: Use inhand-right (4-directional) so the minigun rotates with the
    # bot's facing direction and looks like it is actively being wielded, matching the raider NPC
    # weapon overlay convention used throughout raiders_ranged.yml / faction_humanoids.yml.
