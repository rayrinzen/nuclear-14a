- # #Misfits Add - Pet companion traits for the Pets perk tree (globally available, no role restrictions)
# Each pet spawns a separate invisible ghost-role spawner entity via TraitSpawnEntity,
# allowing multiple pets to each register their own ghost role independently.
# Dog Companion — generic wasteland dog, available to all roles, costs 8 perk points
type: trait
  id: N14PetDogCompanion
  category: Pets
  points: -8
  functions:
    - !type 
      prototypes:
        - MisfitsPetSpawnerDog
