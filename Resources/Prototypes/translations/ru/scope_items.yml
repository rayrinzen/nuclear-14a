# N14 Binoculars — RMC-style directional scope (DoAfter, PVS relay, zoom levels)
# Must be wielded to activate. 2 second use delay. Locks view in cardinal direction.
- type: entity
  parent: BaseItem
  id: N14Binoculars
  name: binoculars
  description: A pair of pre-war binoculars. Wield them and look through to see far in one direction.
  components:
    - type: Item
      size: Small
      heldPrefix: binoculars
    - type: Sprite
      sprite: _Misfits/Objects/Devices/binoculars.rsi
      state: binoculars_civ
    - type: Clothing
      quickEquip: false
      slots:
        - Belt
        - suitstorage
    - type: Wieldable
    - type: Scope
      useInHand: true
      requireWielding: true
      zoomLevels:
        - name: 4x
          zoom: 1.0
          offset: 15
          allowMovement: false
          doAfter: 2
    - type: StaticPrice
      price: 150
    # #Misfits Removed - Binoculars TagPrototype not defined in Nuclear-14
    # - type: Tag
    #   tags:
    #   - Binoculars
# N14 Rifle Scope Attachment — attach to a gun's ItemSlot to gain a scope action.
# Uses ScopeComponent with attachment: true so it only activates from inside a container.
- type: entity
  parent: BaseItem
  id: N14WeaponScopeAttachment
  name: rifle scope
  description: A detachable optic scope for a rifle. Attach it to a compatible weapon to gain a directional scope action.
  components:
    - type: Item
      size: Small
    - type: Sprite
      sprite: _Nuclear14/Objects/Misc/crafting_junk.rsi
      state: scope
    - type: Scope
      attachment: true
      requireWielding: true
      zoomLevels:
        - name: 4x
          zoom: 1.0
          offset: 15
          allowMovement: false
          doAfter: 0.8
    - type: Tag
      tags:
        - RifleScope
    - type: StaticPrice
      price: 100
