- #Misfits barricade construction graphs
type: constructionGraph
  id: BarricadeTanktrap
  start: start
  graph:
    - node: start
      edges:
        - to: Tanktrap
          steps:
            - material: Steel
              amount: 7
              doAfter: 6
          completed:
            - !type 
              southRotation: true
    - node: Tanktrap
      entity: N14BarricadeTanktrap
      edges:
        - to: start
          steps:
            - tool: Welding
              doAfter: 3
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 7
            - !type :DeleteEntity
