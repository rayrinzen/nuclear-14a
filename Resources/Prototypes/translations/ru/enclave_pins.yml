# #Misfits Add - Enclave rank pin entities for the expanded role hierarchy.
# Uses NCR pin sprites as placeholders until custom Enclave art is created.

# Base Enclave pin — all others inherit from this.
- type: entity
  parent: ClothingNeckPinBase
  id: ClothingNeckPinEnclavePrivate
  name: enclave private pin
  description: A United States Government rank insignia showing the wearer's rank.
  components:
    - type: Sprite
      sprite: _Nuclear14/Clothing/Neck/Misc/pins.rsi
      layers:
        - state: private
    - type: Clothing
      sprite: _Nuclear14/Clothing/Neck/Misc/pins.rsi
      clothingVisuals:
        neck:
          - state: gold-equipped

