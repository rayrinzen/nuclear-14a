# Contract tier badges awarded by ContractTierSystem when a player unlocks or advances a tier.
# Each badge is a wearable neck item (medal) appropriate to its tier.
# All 6 tiers: Bronze → Iron → Silver → Gold → Mithril → Diamond

- type: entity
  parent: ClothingNeckMedalBase
  id: N14ContractBadgeBronze
  name: Bronze Caravan Badge
  description: Awarded to travellers who first register with the caravan network. Bronze tier — the beginning of something greater.
  components:
    - type: Sprite
      sprite: Clothing/Neck/Medals/bronzeheart.rsi
    - type: Clothing
      sprite: Clothing/Neck/Medals/bronzeheart.rsi
    - type: Tag
      tags:
        - Medal

- type: entity
  parent: ClothingNeckMedalBase
  id: N14ContractBadgeIron
  name: Iron Caravan Badge
  description: Awarded for completing the Iron tier of caravan contracts. A badge worn by dependable hunters.
  components:
    - type: Sprite
      sprite: Clothing/Neck/Medals/cargomedal.rsi
    - type: Clothing
      sprite: Clothing/Neck/Medals/cargomedal.rsi
    - type: Tag
      tags:
        - Medal

