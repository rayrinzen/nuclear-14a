#Misfits Change /Add/: New consolidated Brotherhood Scribe job.
type: job
  id: BoSScribe
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true
  weight: 30
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-scribe
  description: job-description-bos-scribe
  playTimeTracker: BoSScribe
  requirements:
    - !type 
      species:
      - Human
    - !type 
      department: BrotherhoodOfSteel
      min: 28800 # 8 hours
  #- !type:CharacterPlaytimeRequirement # TEMP REMOVED
  #  tracker: BoSMidSquire
  #  min: 18000 # 5 hours
  startingGear: BoSScribeGear
  alwaysUseSpawner: true
  icon: "JobIconBosMScriptor"
  supervisors: job-supervisors-bos-scribe
  accessGroups:
  - BOSScribe
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
      - type: CPRTraining
      - type: LanguageKnowledge # #Misfits Add: Scribes speak and understand Brotherhood binary code by default.
        speaks:
          - English
          - N14BrotherBeep
        understands:
          - English
          - N14BrotherBeep
      - type: RobotWeaponPickupBlacklist
        blacklist:
          components:
          - Gun
- type: startingGear
  id: BoSScribeGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack
    back: N14ClothingBackpackSatchelMilitary
    shoes: N14ClothingBootsLeatherFilled
    # outerClothing: N14ClothingOuterBrotherhoodMidwestFieldScribeCoat # #Misfits Removed - Coat now comes from loadout kit selection
    pocket1: BoSBrotherhoodScribeKits
    id: N14IDBrotherhoodOfSteelHolotagScribe
    ears: N14ClothingHeadsetBrotherhoodOfSteelScribe
    belt: ClothingBeltMilitary
  storage:
    back:
    - N14BoxPlasticFilledMilitary
- type: playTimeTracker
  id: BoSScribe
