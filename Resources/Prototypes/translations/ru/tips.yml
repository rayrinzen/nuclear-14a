- type: dataset
  id: Tips
  values:
    - "If you're on fire, hit the alert and drop to the ground. Rolling might save your hide."
    - "You can change keybindings anytime in the Options menu."
    - "The in-game guidebook can be opened through the escape menu or by pressing Numpad 0."
    - "Some objects have guide entries. Examine them and look for the question mark icon."
    - "Pre-war artifacts can develop strange permanent properties when tampered with. Sometimes useful. Sometimes fatal."
    - "Walk across slick surfaces to avoid falling. Industrial chemicals will still send you flat on your back."
    - "Mutated plants can be processed into powerful chems and medicine."
    - "Cleaning and collecting spilled liquids preserves valuable reagents."
    - "Drain grates in old facilities will swallow nearby liquids, including blood."
    - "Certain experimental chems can awaken intelligence in animals. Results are unpredictable."
    - "Loaded mousetraps are surprisingly lethal against small pests."
    - "Fire extinguishers can be filled with almost any liquid. Improvise."
    - "Some chems react on contact when sprayed or foamed onto a target."
    - "Step away from the wasteland sometimes. Burnout kills faster than radiation."
    - "You can interact with nearby objects even with full hands using the Activate in World key."
    - "Common sense prevents more gunfights than armor ever will."
    - "Every drifter, raider, and settler you meet is another real person."
    - "If your settlement runs on a generator, guard it well. Power is life."
    - "Backup generators and solar rigs keep the lights on when sabotage hits."
    - "Chemicals stored in proper equipment will not react until dispensed."
    - "Respect the barkeep. Caps are easier earned than teeth."
    - "Slow down vehicles for better control across rough terrain."
    - "Some medical chems purge toxins while they metabolize."
    - "Check your gear. Most wastelanders carry at least basic supplies."
    - "Power sources are prime sabotage targets. Expect raids."
    - "Electrical surges and EMP bursts can fry your electronics. Drop them if you must."
    - "Use a hand labeler to mark supplies clearly."
    - "Heavy combat armor handles melee far better than cloth or leather."
    - "As a ghost, you can orbit and observe the living."
    - "If you're chosen as an antagonist, your goals may include eliminating rivals."
    - "Encrypted radios keep conversations private from prying ears."
    - "Intercepting enemy comms can win wars."
    - "A basic toolkit can solve most mechanical problems."
    - "Light armor vests are cheap insurance."
    - "Explosive creatures may obey their handler, but death still triggers them."
    - "Carrying suspicious chems invites unwanted attention."
    - "Hidden power drains and sabotage tools often make noise. Listen closely."
    - "Plasma burns hot and spreads fast. It also poisons you."
    - "Dehydrated creatures can be revived for distraction. Handle carefully."
    - "Tampering with batteries and volatile compounds can end poorly."
    - "Raiders survive by moving as a pack."
    - "Use your radio. Lone wolves die alone."
    - "Stealth keeps you breathing."
    - "Destroying communication towers cripples coordination."
    - "Examine your radio to see available channels."
    - "Carry a GPS when venturing far from home."
    - "Salvage from ruins fuels your faction's growth."
    - "Grappling tools help you traverse wreckage safely."
    - "Trade routes bring rare weapons and building materials."
    - "Power armor frames and rigs make hauling scrap easier."
    - "Stockpile materials. Tomorrow may not be kind."
    - "Gambling caps rarely ends well."
    - "Traders can provide heavy weapons in desperate times."
    - "Sawn-off shotguns conceal easily under coats."
    - "Experiment with drinks. Some concoctions hit harder than bullets."
    - "Crossbreeding crops can increase yield and potency."
    - "Argue your case calmly during disputes. Violence is not the only option."
    - "Coordinate during combat. Friendly fire is common."
    - "Suspicion alone is not proof."
    - "Forensics tools can track prints and fibers."
    - "A lit welding tool can repair damaged windows and metal."
    - "Uranium infused materials resist radiation."
    - "Artifact research uncovers dangerous but valuable secrets."
    - "Upgraded components improve machine output and efficiency."
    - "Overdosing someone can kill them faster than their wounds."
    - "Upgrade your analyzer batteries for longer field use."
    - "Ask for help if you're unsure. Pride gets people killed."
    - "Winning is less important than telling a good story."
    - "Help new players survive their first days."
    - "Heavy protective suits provide moderate cold resistance."
    - "Improvised weapons can mean the difference between life and death."
    - "Chemical tipped spears inject toxins directly."
    - "Reinforced materials increase weapon durability."
    - "Thrown spears strike harder but may shatter."
    - "Radiation damage requires proper treatment."
    - "Toxins are slow, painful killers."
    - "Bolas can entangle fleeing targets."
    - "Fuel tanks can be modified into crude flamethrowers."
    - "Speed decides most fights."
    - "Drag someone onto yourself to search or strip them."
    - "Climb onto tables or debris by dragging yourself onto them."
    - "CTRL plus right click allows precise item movement."
    - "Cooperating with authority may lessen punishment."
    - "Fire spreads quickly through contact."
    - "Structural breaches create violent winds that pull objects and people."
    - "Burns can cauterize wounds and stop bleeding."
    - "Untreated bleeding will kill you."
    - "Cloth can be salvaged from clothing for bandages."
    - "Sharp tools allow butchering of animals and materials."
    - "Most explosives have adjustable timers."
    - "Click item names in the right click menu to pick them up."
    - "The wasteland is built by its community. Contribute if you can."
    - "Spilled liquids can be used to slow pursuers."
    - "Some melee weapons swing extremely fast."
    - "Hydraulic spreaders can pry open sealed doors."
    - "Drinking blood without the right mutations will poison you."
    - "Your body can only process so many chems at once."
    - "Welding without eye protection damages your vision."
    - "Glass shards can be reforged into usable sheets."
    - "Right click someone and use the heart icon to assess injuries."
    - "Some creatures are more aware than they appear."
    - "Flickering lights and pressure signs can indicate structural danger."
    - "Alt-click food to eat it without picking it up."
