- type: reagent
  id: Stimulants
  name: reagent-name-stimulants
  group: Narcotics
  desc: reagent-desc-stimulants
  physicalDesc: reagent-physical-desc-energizing
  flavor: sharp
  color: "#9A040E"
  boilingPoint: 212.0
  meltingPoint: 170.0
  metabolisms:
    Narcotic:
      metabolismRate: 1.0
      effects:
      - !type 
        walkSpeedModifier: 1.3
        sprintSpeedModifier: 1.3
      - !type 
        conditions:
          - !type 
            min: 80 #please wait 3 minutes before using another stimpack
        damage:
          types:
            Poison: 1
      - !type 
        conditions:
        - !type 
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
      - !type 
        key: Stun
        time: 3
        type: Remove
      - !type 
        key: KnockedDown
        time: 3
        type: Remove
      - !type 
        key: StaminaModifier
        component: StaminaModifier
        time: 3
        type: Add
      - !type 
        key: ForcedSleep
        time: 3
        type: Remove
      - !type 
        conditions:
        - !type 
          reagent: Haloperidol
          max: 0.01
        key: Drowsiness
        time: 10
        type: Remove
    Medicine:
      metabolismRate: 1.0
      effects:
        - !type :ResetNarcolepsy
        - !type 
          factor: 1
        - !type 
          factor: 1
        - !type 
          conditions:
          - !type 
            min: 70
            max: 120 #you've got a chance to get out of crit
          damage:
            groups:
              Burn: -1
              Brute: -1
