- type: reagent
  id: Desoxyephedrine
  name: reagent-name-desoxyephedrine
  group: Narcotics
  desc: reagent-desc-desoxyephedrine
  physicalDesc: reagent-physical-desc-translucent
  flavor: bitter
  color: "#FAFAFA"
  boilingPoint: 212.0 # Dexosyephedrine vape when?
  meltingPoint: 170.0
  metabolisms:
    Poison:
      effects:
      - !type 
        damage:
          types:
            Poison: 0.75
      - !type 
        conditions:
        - !type 
          min: 30
        damage:
          types:
            Poison: 2 # this is added to the base damage of the meth.
            Asphyxiation: 2
    Narcotic:
      effects:
      - !type 
        walkSpeedModifier: 1.35
        sprintSpeedModifier: 1.35
      - !type 
        key: Stutter
        component: StutteringAccent
      - !type :Jitter
      - !type 
        key: Stun
        time: 3
        type: Remove
      - !type 
        key: KnockedDown
        time: 3
        type: Remove
      - !type 
        conditions:
        - !type 
          reagent: Haloperidol
          max: 0.01
        key: Drowsiness
        time: 10
        type: Remove
    Medicine:
      effects:
      - !type 
        conditions:
        - !type 
          min: 20
