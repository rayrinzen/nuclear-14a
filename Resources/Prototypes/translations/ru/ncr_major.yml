- # ncr_major.yml
# NCR Major — the senior command billet above Captain.
# Whitelist-only: hidden from the job picker without an admin-granted whitelist.
# Requires meaningful time as Captain before promotion is possible.
type: job
  id: NCRMajor
  setPreference: true
  hideWithoutJobWhitelist: true # Whitelist-only; only visible to whitelisted players
  hideIfPlaytimeRequirementsNotMet: false
  jobWhitelistBypassesRoleTimers: true
  # #Misfits Tweak - Weight 130: above Captain (120) so Major is top-ranking for war system purposes
  weight: 130
  name: job-name-ncr-major
  description: job-description-ncr-major
  playTimeTracker: NCRMajor
  requirements:
    - !type 
      species:
        - Human
        - Ghoul
    - !type 
      department: NCR
      min: 252000 # 70 hours
  startingGear: NCRMajorGear
  icon: "JobIconNcrLeader"
  supervisors: job-supervisors-ncr-major
  requireAdminNotify: true
  alwaysUseSpawner: true
  canBeAntag: false
  access:
    - NCR
    - NCRSGT
    - NCRMedic
    - NCRLT
    - NCRCaptain
    - NCRMajor
  special:
    - !type 
      components:
        - type: NpcFactionMember
          factions:
            - Wastelander
            - NCR
- # Major shares the Captain's visual loadout — distinct rank is represented via
# the access level. Use the Major collar pin directly so the rank is shown
# without relying on character setup loadout selection.
type: startingGear
  id: NCRMajorGear
  equipment:
    head: N14ClothingHeadHatNCRBeretOfficer
    back: N14ClothingBackpackNCR
    jumpsuit: N14ClothingOfficerUniformNCRDesert
    outerClothing: N14ClothingOuterNCRDressJacketCO
    shoes: N14ClothingBootsCombatFilled
    neck: ClothingNeckPinNCRMajor
    belt: ClothingBeltNCR
    eyes: ClothingEyesGlassesSunglasses
    ears: N14ClothingHeadsetNCR
    pocket1: NCRcaptainloadoutkits
    pocket2: RadioHandheld
    id: N14IDNCRDogtagMajor
  innerClothingSkirt: N14ClothingOfficerUniformNCRDesert
  satchel: N14ClothingBackpackSatchelNCRFilled
  storage:
    back:
      - N14BoxPlasticFilledMilitaryNCR
- type: playTimeTracker
  id: NCRMajor
