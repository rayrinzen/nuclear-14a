- type: constructionGraph
  id: Cyborg
  start: start
  graph:
  - node: start
    entity: CyborgEndoskeleton
    edges:
    -     # empty the parts via prying
to: start
      conditions:
      - !type 
        container: part-container
      steps:
      - tool: Prying
        doAfter: 1
        completed:
          - !type :EmptyAllContainers
    - to: cyborg
      steps:
      - assemblyId: generic
        guideString: borg-construction-guide-string
      - material: Cable
        amount: 1
        doAfter: 1
        store: part-container
      - component: Flash
        name: flash
        store: part-container
        icon:
          sprite: Objects/Weapons/Melee/flash.rsi
          state: flash
      - component: Flash
        name: second flash
        store: part-container
        icon:
          sprite: Objects/Weapons/Melee/flash.rsi
          state: flash
      - tool: Screwing
        doAfter: 1
