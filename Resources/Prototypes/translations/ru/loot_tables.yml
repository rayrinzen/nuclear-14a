# This should be on every other fishing table
type: entityTable
  id: BasicFishingLootTable
  table: !type
    children:
    - !type 
      tableId: WaterFishTable
      weight: 100
- # All types of the rare and unique fishes
# Table for rare/dangerous fish (for high skill or luck)
type: entityTable
  id: RareFishTable
  table: !type
    children:
    - !type ":EntSelector { id": FishSvarka } # Welding catfish
    - !type ":EntSelector { id": FishPowerArmor } # Armor fish
    - !type ":EntSelector { id": FishAngler } # Angler (light)
    - !type ":EntSelector { id": FishFugu } # Fugu (poison)
    - !type ":EntSelector { id": FishClown } # Clown (gender swap)
    - !type ":EntSelector { id": FishLegion } # Dream (drugs)
    - !type ":EntSelector { id": FishGun } # Gun-fish (gunpowder)
    - !type ":EntSelector { id": FishBomb } # Pyro pike (explosives)
    - !type ":EntSelector { id": FishGold } # Golden carp (money)
    - !type ":EntSelector { id": FishExocoetidae } # Aero shark (plasteel)
    - !type ":EntSelector { id": FishOctopus } # Octopus (ink)
    - !type ":EntSelector { id": FishTropic } # Acid eel
- # Table of common fish (food and basic resources)
type: entityTable
  id: WaterFishTable
  table: !type  # Switch to Random so only ONE fish is selected
    children:
    - !type 
      id: FishSardina
      weight: 20
    - !type 
      id: FishCarp
      weight: 20
    - !type 
      id: FishShrimp
      weight: 20
    - !type 
      id: FishCrab
      weight: 20
    - !type 
      id: FishBone
      weight: 20 # Bones drop often (preservative)
    - !type 
      id: FishStar
      weight: 15 # Medicine
    - !type 
      id: FishCarrot
      weight: 15 # Clay
    - !type 
      id: FishYorsh
      weight: 15 # Slime
    - !type 
      id: FishSvarka
      weight: 10 # Fuel
    - !type 
      id: FishPowerArmor
      weight: 10 # Armor
    - !type 
      id: FishTropic
      weight: 10 # Acid
    - !type 
      id: FishOctopus
      weight: 8 # Ink
    - !type 
      id: FishFugu
      weight: 5 # Poison
    - !type 
      id: FishLegion
      weight: 5 # Drugs
    - !type 
      id: FishClown
      weight: 4 # Sex change (slightly rarer)
    - !type 
      id: NF14FishAngler
      weight: 5 # Light
    - !type 
      id: FishGun
      weight: 2 # Weapon
    - !type 
      id: FishBomb
      weight: 2 # Explosives
    - !type 
      id: FishExocoetidae
      weight: 1 # Plasteel (Very rare)
    - !type 
      id: FishGold
      weight: 1 # Gold (Jackpot)
- # Items from Water
type: entityTable
  id: WaterFishingLootTable
  table: !type
    children:
      - !type 
        tableId: BasicFishingLootTable
        weight: 70
      - !type 
        tableId: WaterFishTable
        weight: 20
      - !type 
        tableId: RareFishTable
        weight: 10
- # Items from Lava
type: entityTable
  id: LavaFishingLootTable
  table: !type
    children:
      - !type 
        tableId: BasicFishingLootTable
- # Items from Plasma
type: entityTable
  id: PlasmaFishingLootTable
  table: !type
    children:
      - !type 
        tableId: BasicFishingLootTable
- # Items from Toilets
type: entityTable
  id: ToiletFishingLootTable
  table: !type
    children:
      - !type 
        tableId: BasicFishingLootTable
        weight: 80
      - !type 
        tableId: WaterFishTable
        weight: 20
