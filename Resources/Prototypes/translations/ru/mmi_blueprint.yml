# MMI (Man-Machine Interface) blueprint and N14-compatible MMI entity.
#
# Player acquisition path:
#   Find N14BlueprintMMI (medical/science loot, or military caches)
#     → Insert into a weapon workbench storage slot
#     → Unlocks N14BPMMIRecipe recipe in the workbench (Blueprint tab)
#     → Craft N14MMI using Steel + Glass + Gold
#     → Surgically extract a brain → place in N14MMI → insert N14MMI into Robobrain chassis

# N14-compatible MMI entity.
# Inherits all behaviour from upstream MMI but replaces the LanguageKnowledge
# with N14 language IDs. TauCetiBasic and RobotTalk do not exist in N14's
# language prototype registry and would throw errors if the upstream entity
# were spawned directly.
- type: entity
  parent: MMI
  id: N14MMI
  suffix: N14
  components:
    - type: LanguageKnowledge
      speaks:
        - N14Robot
        - English
      understands:
        - N14Robot
        - English
        - N14BrotherBeep

# Blueprint item — a Pre-War technical document
# Insert into a weapon workbench to unlock the N14MMI fabrication recipe
- type: entity
  parent: N14BlueprintBase
  id: N14BlueprintMMI
  name: MMI Assembly Schematic
  description: >
    A Pre-War technical schematic for assembling a Man-Machine Interface unit — the cranial bridge between a biological brain and robotic hardware. Insert it into a weapon workbench to unlock the fabrication recipe.
  components:
    - type: Blueprint
      recipes:
        - N14BPMMIRecipe
