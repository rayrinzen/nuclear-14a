- type: constructionGraph
  id: N14Cardboard
  start: start
  graph:
    - node: start
      edges:
        - to: cardboard
          steps:
            - material: N14Paper
              amount: 2
              doAfter: 2
    - node: cardboard
      entity: MaterialCardboard1

- type: constructionGraph
  id: N14Paper
  start: start
  graph:
    - node: start
      edges:
        - to: paper
          steps:
            - material: WoodPlank
              doAfter: 2
    - node: paper
      entity: N14Paper

# Produces 1 gunpowder unit from 1 sulfur powder + 1 coal + 1 fertilizer ore
- type: constructionGraph
  id: N14GunpowderCraft
  start: start
  graph:
    - node: start
      edges:
        - to: gunpowder
          steps:
            - material: Sulfur
              amount: 1
            - material: Coal
              amount: 1
            - material: FertilizerOre
              amount: 1
    - node: gunpowder
      entity: N14Gunpowder1

