- type: job
  id: NCRFieldRanger
  setPreference: true
  alwaysUseSpawner: true
  jobWhitelistBypassesRoleTimers: true
  weight: 8 # #Misfits Add - position below Veteran Ranger, above Patrol
  name: job-name-ranger-field
  description: job-description-ranger-field
  playTimeTracker: NCRFieldRanger
  startingGear: NCRFieldRangerGear
  icon: "JobIconSecurityOfficer"
  supervisors: job-supervisors-ranger-veteran
  canBeAntag: false
  access:
  - NCR
  - NCRSGT
  - NCRRanger
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - Rangers
  requirements:
    - !type 
      department: Rangers
      min: 72000 # 20 hours
    - !type 
      inverted: true
      species:
      - RobotMrHandy
      - RobotProtectron
      - RobotProtectronPolice
      - RobotProtectronBuilder
      - RobotProtectronFire
      - RobotMrGutsy
      - RobotAssaultron
      - RobotAssaultronTesla
      - RobotSentryBot
      - RobotSentryBotLaser
      - RobotRobobrain
      - RobotRobobrainLaser
      - SuperMutant
      - GhoulGlowing
