- type: constructionGraph
  id: Shower
  start: start
  graph:
    - node: start
      edges:
        - to: shower
          completed:
            - !type ':SnapToGrid { }'
          steps:
            - material: Steel
              amount: 5
              doAfter: 1
    - node: shower
      entity: Shower
      edges:
        - to: start
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 5
            - !type ':EmptyAllContainers {}'
            - !type ':DestroyEntity {}'
          conditions:
            - !type 
              anchored: false
          steps:
            - tool: Welding
              doAfter: 2
