# ── Mentats (shared by all variants: Mentats, MentatsOrange, MentatsGrape, MentatsBerry)
# Mentats sharpen the mind; withdrawal leaves a dull, foggy emptiness.
- type: moodEffect
  id: MentatsWithdrawal
