# #Misfits Add - Stealth Boy item. Uses the Pip-Boy sprite from _Nuclear14, tinted blue,
# but only functions as a wearable cloaking device.
# #Misfits Fix - Keep the device as a simple id-slot wearable so activating it cannot
# tear down PDA slots, cartridges, or inserted IDs.

- type: entity
  id: MisfitsStealthBoy
  name: Stealth Boy
  description: A pre-war personal stealth device developed by RobCo Industries. Generates a light-bending field around the wearer, rendering them nearly invisible for a short time.
  parent: Clothing
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
      color: "#4488FF" # Blue tint to distinguish from a standard Pip-Boy
      scale: 0.75, 0.75
    - type: Clothing
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      slots:
        - idcard
    - type: Item
      size: Small
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      heldPrefix: pda
    # #Misfits Tweak - Visibility raised from -1 (fully invisible) to 0.3 so the
    # cloak reads like the Chinese Stealth Suit: a translucent, distorted shimmer
    # rather than total invisibility. SharedStealthBoySystem also clamps the
    # spawned StealthComponent's MinVisibility to this value.
    - type: StealthBoy
      duration: 30
      fadeInTime: 1.5
      fadeOutTime: 2
      visibility: 0.3
    - type: ActionGrant
      actions:
        - ActionActivateStealthBoy
    - type: ItemActionGrant
      actions:
        - ActionActivateStealthBoy
    - type: StaticPrice
      price: 800
