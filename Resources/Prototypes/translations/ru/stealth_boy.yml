- # #Misfits Add: Hotkey action for the Stealth Boy wearable.
# Granted while the device is held or equipped so the wearer can trigger the cloak directly.
type: entity
  id: ActionActivateStealthBoy
  name: Activate Stealth Boy
  description: Trigger the Stealth Boy's light-bending field and vanish from sight for a short time.
  categories:
  - HideSpawnMenu
  components:
  - type: InstantAction
    useDelay: 0.25
    icon:
      sprite: _Nuclear14/Objects/Misc/pipboy.rsi
      state: pda
    event: !type :ActivateStealthBoyActionEvent
