- type: entity
  parent: N14ClothingHeadHelmetPowerArmorT51
  id: N14ClothingHeadHelmetPowerArmorT51NCR
  name: t-51 NCR power armor helmet
  description: A rugged helmet used by the NCR with their modified T-51 power armor. Designed for durability and reliability in the field.
  components:
    - type: Sprite
      netsync: false
      sprite: Corvax/Clothing/Head/PowerArmorHelmets/t51NCR.rsi

- type: entity
  parent: N14ClothingHeadHelmetPowerArmorT60
  id: N14ClothingHeadHelmetPowerArmorT60NCR
  name: t-60 NCR power armor helmet
  description: A standard-issue helmet used by the NCR with their T-60 power armor. Provides solid protection and comfort for long deployments.
  components:
    - type: Sprite
      netsync: false
      sprite: Corvax/Clothing/Head/PowerArmorHelmets/t60NCR.rsi

- type: entity
  parent: N14ClothingHeadHelmetPowerArmorX01
  id: N14ClothingHeadHelmetPowerArmorX01NCR
  name: x-01 NCR power armor helmet
  description: A high-tech helmet used by the NCR with their advanced X-01 power armor. Offers superior protection and advanced features for elite troops.
  components:
    - type: Sprite
      netsync: false
      sprite: Corvax/Clothing/Head/PowerArmorHelmets/x01NCR.rsi

- type: entity
  parent: N14ClothingHeadHelmetPowerArmorX02
  id: N14ClothingHeadHelmetPowerArmorX02Tesla
  name: X-02 tesla power armor helmet
  description: The Enclave Mark II Powered Combat Armor helmet.
  components:
    - type: Sprite
      netsync: false
      sprite: Corvax/Clothing/Head/PowerArmorHelmets/x02Tesla.rsi

- type: entity
  parent: N14ClothingHeadHelmetPowerArmorT45
  id: N14ClothingHeadHelmetPowerArmorT45Sierra
  name: T45 Sierra power armor helmet
  description: The legendary T-45 Sierra power armor helmet. A symbol of the pre-war era, this rare piece combines classic protection with upgraded electronics for frontline combat superiority.
  components:
    - type: Sprite
      netsync: false
      sprite: Corvax/Clothing/Head/PowerArmorHelmets/T45Siera.rsi

