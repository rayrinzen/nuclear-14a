# #Misfits Add - Procedural underground expedition difficulties
# Three themes (Vault, Sewer, Metro) each at their own tier.
# Maps are generated fresh every launch from a per-launch seed.
# Grid size 80×80 gives roughly 6400 tiles of underground space.
# Players always spawn at grid centre (central congregation room).
- type: n14ExpeditionDifficulty
  id: N14ExpeditionVaultProcedural
  name: n14-expedition-difficulty-vault-procgen
  color: "#5A7A5A" # vault green
  duration: 1200 # 20 minutes
  sortOrder: 1
  maps:
    - runtimeProcedural: true
      proceduralTheme: Vault
      proceduralGridSize: 80
      proceduralDifficultyTier: 1
      proceduralMinRooms: 7
      proceduralMaxRooms: 12
      proceduralHubCount: 3

- type: n14ExpeditionDifficulty
  id: N14ExpeditionSewerProcedural
  name: n14-expedition-difficulty-sewer-procgen
  color: "#4A7A4A" # dirty sewer green
  duration: 1200 # 20 minutes
  sortOrder: 2
  maps:
    - runtimeProcedural: true
      proceduralTheme: Sewer
      proceduralGridSize: 80
      proceduralDifficultyTier: 1
      proceduralMinRooms: 6
      proceduralMaxRooms: 10
      proceduralHubCount: 2

- type: n14ExpeditionDifficulty
  id: N14ExpeditionMetroProcedural
  name: n14-expedition-difficulty-metro-procgen
  color: "#5A5A8A" # metro slate blue
  duration: 1200 # 20 minutes
  sortOrder: 3
  maps:
    - runtimeProcedural: true
      proceduralTheme: Metro
      proceduralGridSize: 80
      proceduralDifficultyTier: 1
      proceduralMinRooms: 8
      proceduralMaxRooms: 14
      proceduralHubCount: 4
