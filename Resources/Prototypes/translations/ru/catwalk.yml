- # TODO move this to tiles once tile smoothing is supported
# Misfits Change - Added Physics and Fixtures so catwalk has a physics body (needed for interaction/RCD)
# Misfits Fix - Fixture has NO layer, so it is fully transparent to all projectiles (bullets, lasers, hitscan)
type: entity
  id: Catwalk
  name: catwalk
  description: A catwalk for easier EVA maneuvering and cable placement.
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    sprite: Structures/catwalk.rsi
    drawdepth: FloorTiles
  - type: Icon
    sprite: Structures/catwalk.rsi
    state: catwalk_preview
  - type: Transform
    anchored: true
  - type: IconSmooth
    key: catwalk
    base: catwalk_
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepCatwalk
      params:
        volume: 8
  - type: Tag
    tags:
      - Catwalk
  - type: Construction
    graph: Catwalk
    node: Catwalk
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger: '!type:DamageTrigger damage: 500 behaviors: - !type:DoActsBehavior acts: [ "Destruction" ]'
    - trigger: '!type:DamageTrigger damage: 200 behaviors: - !type:SpawnEntitiesBehavior spawn: PartRodMetal: min: 0 max: 1 - !type:DoActsBehavior acts: [ "Destruction" ]' # takes two to construct, so drop less than that
  - type: RCDDeconstructable
    cost: 2
    delay: 2
    fx: EffectRCDDeconstruct2
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: '!type:PhysShapeAabb bounds: "-0.5,-0.5,0.5,0.5"' # Misfits Fix - no layer defined so bullets AND lasers (Opaque hitscan) both pass through catwalks
