# #Misfits Fix: these Corvax wasteland tile names are localized at runtime, so they must use locale keys rather than raw English labels.
- type: tile
  id: ForgeFloorWasteland # Forge-Tiles
  name: tiles-forge-wasteland-floor
  sprite: /Textures/Corvax/Tiles/wasteland.png
  variants: 4
  placementVariants: [ 0, 1, 2, 3 ]
  # #Misfits Tweak: Wendover uses Forge wasteland variants, so opt them into the same terrain blend group.
  blendGroup: terrain
  blendPriority: 0
  blendMaskSet: soft-terrain
  baseTurf: space
  isSubfloor: true
  footstepSounds:
    collection: N14FootstepDirt
  friction: 0.30
  thermalConductivity: 0.04
  heatCapacity: 10000
  weather: true
  indestructible: true

