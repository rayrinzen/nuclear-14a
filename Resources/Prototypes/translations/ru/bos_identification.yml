##MARK: Brotherhood Midwest
- type: entity
  parent: N14IDPassportBlank
  id: N14IDBrotherhoodHolotag
  name: senior scribe's holotags
  description: An ID holotag worn by the Brotherhood of Steel.
  suffix: Senior Scribe
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Misc/identification.rsi
      state: bos_holotag
    - type: IdCard
      nameLocId: n14-id-holotag-name
      fullNameLocId: n14-id-holotag-full-name
    - type: PresetIdCard
      job: BoSMidScribe
    - type: Tag
      tags:
        - IdCardBrotherhood
    - type: ClothingAddFaction
      faction: BrotherhoodOfSteel

- type: entity
  parent: N14IDBrotherhoodHolotag
  id: N14IDBrotherhoodHolotagSquire
  name: squire's holotags
  description: An ID holotag worn by the Brotherhood of Steel.
  suffix: Squire
  components:
    - type: PresetIdCard
      job: BoSMidSquire

- type: entity
  parent: N14IDBrotherhoodHolotag
  id: N14IDBrotherhoodHolotagKnight
  name: senior knight's holotags
  description: An ID holotag worn by the Brotherhood of Steel.
  suffix: Senior Knight
  components:
    - type: PresetIdCard
      job: BoSMidKnight

- type: entity
  parent: N14IDBrotherhoodHolotag
  id: N14IDBrotherhoodHolotagPaladin
  name: senior paladin's holotags
  description: An ID holotag worn by the Paladins of the Brotherhood of Steel.
  suffix: Senior Paladin
  components:
    - type: PresetIdCard
      job: BoSMidPaladin

- type: entity
  parent: N14IDBrotherhoodHolotag
  id: N14IDBrotherhoodHolotagCommander
  name: head paladin's holotags
  description: An ID holotag worn by the Head Paladin of the Brotherhood of Steel.
  suffix: Head Paladin
  components:
    - type: PresetIdCard
      job: BoSMidPaladinCommander

