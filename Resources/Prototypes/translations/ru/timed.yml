- type: entity
  parent: N14TimedSpawnerMolerat
  id: N14TimedSpawnerMirelurk
  name: periodic mirelurk spawner
  components:
    - type: Sprite
      layers:
        - state: blue
        - sprite: Corvax/Mobs/Animals/mirelurk.rsi
          state: mirelurk
        - state: timed
    - type: TimedSpawner
      prototypes:
        - N14MobMirelurk
      chance: 0.75
      intervalSeconds: 2400
      minimumEntitiesSpawned: 1
      maximumEntitiesSpawned: 2

