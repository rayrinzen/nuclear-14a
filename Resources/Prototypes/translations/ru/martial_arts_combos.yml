# #Misfits Add - Martial Arts combo definitions for all six Fallout-themed fighting styles
# Each misfitsCombo defines a single attack sequence and its outcome.
# Each misfitsComboList groups a style's combos for assignment via GrantMartialArtsSystem.

# =============================================
# LEGION GLADIATORIAL FIGHTING STYLE
# (Centurion and Legate job default)
# =============================================
- type: misfitsCombo
  id: LegionBodySlam
  martialArtsForm: LegionGladiatorial
  attacks:
    - Grab
    - Harm
  extraDamage: 8
  damageType: Blunt
  staminaDamage: 20
  paralyzeTime: 1.5
  thrownSpeed: 6

- type: misfitsCombo
  id: LegionFootSweep
  martialArtsForm: LegionGladiatorial
  attacks:
    - Disarm
  extraDamage: 3
  damageType: Blunt
  paralyzeTime: 1.0

- type: misfitsCombo
  id: LegionCrushingBlow
  martialArtsForm: LegionGladiatorial
  attacks:
    - Harm
    - Harm
  extraDamage: 10
  damageType: Blunt
  paralyzeTime: 2.0

- type: misfitsCombo
  id: LegionNeckGrip
  martialArtsForm: LegionGladiatorial
  attacks:
    - Grab
    - Grab
  dropItems: true

- type: misfitsComboList
  id: LegionGladiatorialCombos
  combos:
    - LegionBodySlam
    - LegionFootSweep
    - LegionCrushingBlow
    - LegionNeckGrip

