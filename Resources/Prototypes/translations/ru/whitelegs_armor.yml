# #Misfits Add - White Legs faction armor for the Outlaws faction overhaul.
# The White Legs are a tribal raider group known for their white body paint and guerrilla tactics.
# Their armor is lightweight tribal gear — bone, leather, and scavenged military webbing.
# Stats baseline: NCR Private T2 ±10%. Biased toward slash/heat resistance (treated hides).
# Sprites: placeholder khansjacket.rsi until WhiteLegs-specific RSIs are sourced and converted.

- type: entity
  parent: N14FalloutArmorBase
  id: MisfitsClothingOuterWhiteLegsArmor
  name: white legs tribal armor
  description: Layered gecko hides and woven cord over a frame of yao guai bone. The White Legs mark their armor with white chalk handprints — one for each raid survived. Light enough to run in, tough enough to matter.
  components:
    - type: Sprite
      sprite: _Misfits/Clothing/OuterClothing/Armor/whitelegsarmor.rsi
    - type: Clothing
      sprite: _Misfits/Clothing/OuterClothing/Armor/whitelegsarmor.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.88 # slightly worse than NCR Private (0.85) — hides don't stop blunt well
          Slash: 0.80 # better than baseline (0.85) — layered gecko hide deflects blades
          Piercing: 0.82 # near-baseline — enough to slow a bullet, not stop it
          Heat: 0.78 # better than baseline (0.80) — treated hides insulate
    - type: ExplosionResistance
      damageCoefficient: 0.92 # slightly worse than NCR Private (0.90) — light armor
