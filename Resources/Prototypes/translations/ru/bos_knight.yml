#Misfits Change /Add/: New consolidated Brotherhood Knight job.
type: job
  id: BoSKnight
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true
  weight: 40
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-knight
  description: job-description-bos-knight
  playTimeTracker: BoSKnight
  requirements:
    - !type 
      species:
      - Human
    - !type 
      department: BrotherhoodOfSteel
      min: 28800 # 8 hours
  #- !type:CharacterPlaytimeRequirement # TEMP REMOVED
  #  tracker: BoSMidSquire
  #  min: 36000 # 10 hours
  startingGear: BoSKnightGear
  alwaysUseSpawner: true
  icon: "JobIconBosMKnight"
  supervisors: job-supervisors-bos-knight
  accessGroups:
  - BOSKnight
  special:
  - !type 
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
- type: startingGear
  id: BoSKnightGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadHatCapkhighBoS
    outerClothing: MisfitsBoSKnightArmor # #Misfits Tweak: T4 armor (0.75/0.70) — Knight tier, equal to NCR Specialist / Legion Veteran Legionnaire
    hands: N14ClothingHandsGlovesCombat
    pocket1: BoSBrotherhoodKnightKits
    id: N14IDBrotherhoodOfSteelHolotagKnight
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: ClothingBeltBoSWebbing
  storage:
    back:
    - N14ClothingHeadHatBrotherhoodHelmetMK2
    - N14BoxPlasticFilledMilitary
    - N14Binoculars
- type: playTimeTracker
  id: BoSKnight
