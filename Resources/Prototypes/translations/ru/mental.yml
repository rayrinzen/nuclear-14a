- type: trait
  id: N14Narcolepsy
  category: Mental
  points: 2
  functions:
    - !type 
      components:
      - type: Narcolepsy
        timeBetweenIncidents: 300, 600
        durationOfIncident: 10, 30
- type: trait
  id: N14CPRTraining
  category: Mental
  points: -8 # #Misfits Tweak - raised from -4; CPR is a strong revival tool, cost should reflect that
  requirements:
    - !type 
      inverted: true
      jobs:
        - TribalShaman
        - TownDoctor
        - NCRDoctor
        - BoSMidScribe
        - VaultDoctor
        - FollowerHead
        - FollowerDoctor
        - FollowerVolunteer
  functions:
    - !type 
      components:
        - type: CPRTraining
- type: trait
  id: N14SelfAware
  category: Mental
  points: -4
  functions:
    - !type 
      components:
        - type: SelfAware
          analyzableTypes:
            - Blunt
            - Slash
            - Piercing
            - Heat
            - Shock
            - Cold
            - Caustic
          detectableGroups:
            - Airloss
            - Toxin
- type: trait
  id: N14Liar
  category: Mental
  points: 1
  requirements:
    - !type 
      inverted: true
      traits:
        - N14FrontalLisp
        - N14ScottishAccent
        - N14Stutter
  functions:
    - !type 
      components:
        - type: ReplacementAccent
          replacementChance: 0.2
          accent: liar
