- type: trait
  id: N14CarefulSteps
  category: Mental
  points: -4
  functions:
    - !type 
      components:
        - type: StepTriggerImmune
          whitelist:
            types:
              - Shard
              - Landmine
              - Mousetrap
              - SlipEntity
- type: trait
  id: N14Pickpocket
  category: Mental
  points: -6
  functions:
    - !type 
      components:
        - type: Thieving
          ignoreStripHidden: true
          stealth: Subtle
          stripTimeReduction: 0
          stripTimeMultiplier: 0.667
- type: trait
  id: N14Pacifist
  category: Mental
  points: 8
  requirements:
    - !type 
      inverted: true
      jobs:
        - TownSheriff
        - TownDeputy
        - NCRCaptain
        - NCRLT
        - NCRVeteranRanger
        - NCRFieldRanger
        - NCRPatrolRanger
        - NCRDoctor
        - NCRFirstSergeant
        - NCRStaffSergeant
        - NCRSGT
        - NCRWS
        - NCRPrivateFirstClass
        - NCRSoldier
        - NCRCadet
        - BoSMidPaladinCommander
        - BoSMidPaladin
        - BoSMidKnight
        - BoSMidSquire
        - NCRMPinvestigator
        - BoSWestElderCommander
        - CaesarLegionCenturion
        - CaesarLegionLegate
        - CaesarLegionVeteranDecanus
        - CaesarLegionFrumentarii
        - CaesarLegionPrimeDecanus
        - CaesarLegionVexillarius
        - CaesarLegionExplorer
        - CaesarLegionOrator
