# #Misfits Add - Children of Atom banner structures using submitted art (MrGreen).
# Small banner uses BannerBase (free-standing, collideable).
# Big banner uses N14DecorationFlagFlammable (flag-pole style, flammable).

# --- Small COA Banner ---
- type: entity
  parent: N14SignBase
  id: MisfitsBannerChildrenOfAtom
  name: Children of Atom Flag
  description: A banner bearing the sacred symbol of the Children of Atom. It radiates faint warmth to true believers.
  components:
    - type: Sprite
      sprite: _Misfits/Structures/Decoration/coa_banner_small.rsi
      state: banner
    - type: Construction
      graph: MisfitsFlagSmallCoA
      node: flagcoas

# --- Large COA Flag ---
- type: entity
  parent: N14DecorationFlagFlammable
  id: MisfitsDecorationFlagChildrenOfAtom
  name: Children of Atom flag
  description: A tall flag bearing the symbol of the Children of Atom. It flutters solemnly in glow-tainted breezes.
  components:
    - type: Sprite
      sprite: _Misfits/Structures/Decoration/coa_banner_big.rsi
      state: banner
    - type: Construction
      graph: MisfitsFlagCoA
      node: flagcoa
