- type: htnCompound
  id: MedibotCompound
  branches:
    - 
    tasks:
        - !type 
          task: InjectNearbyCompound
    - 
    tasks:
        - !type 
          task: IdleCompound
- type: htnCompound
  id: InjectNearbyCompound
  branches:
    - 
    tasks:
        - !type 
          operator: !type
            targetKey: InjectTarget
            targetMoveKey: TargetCoordinates
        - !type 
          operator: !type
            speech: medibot-start-inject
            hidden: true
        - !type 
          operator: !type
            pathfindInPlanning: false
        - !type 
          operator: !type
            targetKey: IdleTime
            amount: 3
        - !type 
          operator: !type
            key: IdleTime
          preconditions:
            - !type 
              key: IdleTime
        - !type 
          operator: !type
            targetKey: InjectTarget
