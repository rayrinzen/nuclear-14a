- # New Terminal
type: constructionGraph
  id: TerminalNew
  start: start
  graph:
    - node: start
      actions:
        - !type 
          prototype: SheetSteel1
        - !type :DeleteEntity
      edges:
        - to: missingWires
          steps:
            - material: Steel
              amount: 2
              doAfter: 3
        - to: Broken
          steps:
            - material: Steel
              amount: 2
              doAfter: 3
    - node: missingWires
      entity: N14ComputerTerminalBase
      edges:
        - to: Frame
          steps:
            - material: Cable
        - to: start
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 2
            - !type :DeleteEntity
          steps:
            - tool: Welding
              doAfter: 2
    - node: Frame
      entity: N14ComputerTerminalNewWired
      edges:
        - to: Terminal
          steps:
            - tool: Screwing
              doAfter: 1
            - material: Circuitry
        - to: missingWires
          completed:
            - !type 
              prototype: CableApcStack1
          steps:
            - tool: Cutting
              doAfter: 1
    - node: Terminal
      entity: N14ComputerTerminalNew
      edges:
        - to: Frame
          steps:
            - tool: Screwing
              doAfter: 2
          completed:
            - !type 
              prototype: N14ComputerTerminalNewWired
              amount: 1
            - !type 
              prototype: N14MaterialCircuitry1
              amount: 1
            - !type ':DeleteEntity {}'
    - node: Broken
      entity: N14ComputerTerminalNewBroken
      edges:
        - to: start
          steps:
            - tool: Welding
              doAfter: 2
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 1
            - !type ':DeleteEntity {}'
- # Normal Terminal
type: constructionGraph
  id: Terminal
  start: start
  graph:
    - node: start
      actions:
        - !type 
          prototype: SheetSteel1
        - !type :DeleteEntity
      edges:
        - to: missingWires
          steps:
            - material: Steel
              amount: 2
              doAfter: 3
        - to: Broken
          steps:
            - material: Steel
              amount: 2
              doAfter: 3
    - node: missingWires
      entity: N14ComputerTerminalBase
      edges:
        - to: Frame
          steps:
            - material: Cable
        - to: start
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 2
            - !type :DeleteEntity
          steps:
            - tool: Welding
              doAfter: 2
    - node: Frame
      entity: N14ComputerTerminalWired
      edges:
        - to: Terminal
          steps:
            - tool: Screwing
              doAfter: 1
            - material: Circuitry
        - to: missingWires
          completed:
            - !type 
              prototype: CableApcStack1
          steps:
            - tool: Cutting
              doAfter: 1
    - node: Terminal
      entity: N14ComputerTerminal
      edges:
        - to: Frame
          steps:
            - tool: Screwing
              doAfter: 2
          completed:
            - !type 
              prototype: N14ComputerTerminalWired
              amount: 1
            - !type 
              prototype: N14MaterialCircuitry1
              amount: 1
            - !type ':DeleteEntity {}'
        - to: Rigged
          steps:
            - tool: Screwing
              doAfter: 1
            - tag: Bomb # Corvax-Change
              store: bomb
              name: explosive
              icon:
                sprite: Objects/Weapons/Bombs/c4.rsi
                state: icon
          completed:
            - !type 
              prototype: N14ComputerTerminalRigged
              amount: 1
            - !type ':DeleteEntity {}'
    - node: Rigged
      entity: N14ComputerTerminalRigged
      edges:
        - to: Terminal
          steps:
            - tool: Screwing
              doAfter: 2
          completed:
            - !type 
              prototype: N14ComputerTerminal
              amount: 1
            - !type 
              prototype: C4
              amount: 1
            - !type ':DeleteEntity {}'
    - node: Broken
      entity: N14ComputerTerminalBroken
      edges:
        - to: start
          steps:
            - tool: Welding
              doAfter: 2
          completed:
            - !type 
              prototype: SheetSteel1
              amount: 1
            - !type ':DeleteEntity {}'
