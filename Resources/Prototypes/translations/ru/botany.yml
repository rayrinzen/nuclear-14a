- type: reagent
  id: Ammonia
  name: reagent-name-ammonia
  group: Botanical
  desc: reagent-desc-ammonia
  physicalDesc: reagent-physical-desc-pungent
  flavor: bitter
  color: "#77b58e"
  boilingPoint: '-33.0'
  meltingPoint: '-77.7'
  plantMetabolism:
  - !type 
    amount: 1
  - !type 
    amount: 0.5
  metabolisms:
    Poison:
      effects:
      - !type 
        damage:
          types:
            Caustic: 1
    Gas:
      effects:
      - !type 
        conditions:
        - !type 
          type: Rat
          shouldHave: false
        - !type 
          reagent: Ammonia
          min: 1
        ignoreResistances: true
        damage:
          types:
            Poison: 0.25
      - !type 
        probability: 0.12
        conditions:
        - !type 
          type: Rat
          shouldHave: false
        - !type 
           type: Vox
           shouldHave: false
        - !type 
          reagent: Ammonia
          min: 0.8
      - !type 
        type: Local
        visualType: Medium
        messages:
        - "ammonia-smell"
        probability: 0.1
        conditions:
        - !type 
          reagent: Ammonia
          min: 0.25
      - !type 
        conditions:
        - !type 
          type: Rat
        - !type 
          reagent: Ammonia
          min: 1
        scaleByQuantity: true
        ignoreResistances: true
        damage:
          groups:
            Brute: -5
            Burn: -5
          types:
            Bloodloss: -5
      - !type 
        conditions:
        - !type 
          type: Vox
        factor: -4
