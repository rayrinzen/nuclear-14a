- type: dungeonConfig
  id: Mineshaft
  generator: !type
    tile: FloorCaveDrought
    roomWhitelist:
      - Mineshaft
    presets:
      - Bucket
      - Wow
      - SpaceShip
      - Tall
  postGeneration:
  - !type 
      tile: FloorCaveDrought
      width: 3
  - !type 
      count: 5
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall
  - !type 
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall
  - !type 
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall
  - !type 
      tile: FloorCaveDrought
      entities:
        - RandomWoodenWall
  - !type 
      tile: FloorCaveDrought
      spawns:
        -         # Ore
id: WallRockSalt
          prob: 0.6
          orGroup: content
        - id: WallRockCoal
          prob: 0.6
          orGroup: content
        - id: WallRockTin
          prob: 0.4
          orGroup: content
        - id: WallMining
          prob: 0.8
          orGroup: content
  - !type 
      tile: FloorCaveDrought
      wall: WallRock
      cornerWall: WallRock
  - !type 
      entity: Catwalk
  - !type 
      tile: FloorCaveDrought
      width: 3
      entities:
        - RandomWoodenSupport
  - !type 
      contents:
        - id: RandomStalagmiteOrCrystal
          amount: 1
