- # NF dungeon configs ported to N14 (old generator/postGeneration architecture)
# Atlas maps and room themes sourced from Frontier Station 14 (AGPLv3)
# Thematic translations:
#   NFCaveFactory    → Pre-war industrial underground facility
#   NFLavaMercenary  → Raider/mercenary stronghold on hostile terrain
#   NFHaunted        → Abandoned haunted cave complex (uses NFHaunted rooms)
#   NFMineshaft      → Pre-war mining operation (richer room set than upstream Mineshaft)
#   NFSalvageOutpost → Scavenger resource-extraction outpost
type: dungeonConfig
  id: NFCaveFactory
  generator: !type
    roomWhitelist:
      - NFCaveFactory
    presets:
      - Bucket
      - Wow
      - SpaceShip
      - Tall
  postGeneration:
    - !type 
      width: 3
    - !type 
      count: 2
    - !type 
      entities:
        - CableApcExtension
        - AirlockGlass
    - !type 
      entities:
        - Grille
        - Window
    - !type 
      entities:
        - Grille
        - Window
    - !type 
      spawns:
        - id: RandomPosterLegit
          orGroup: content
        - id: ExtinguisherCabinetFilled
          prob: 0.2
          orGroup: content
        - id: RandomPainting
          prob: 0.05
          orGroup: content
    - !type 
      tile: FloorSteel
      wall: WallSolid
      cornerWall: WallReinforced
    - !type 
      width: 1
    - !type :JunctionPostGen
    - !type :AutoCablingPostGen
    - !type 
      contents:
        - id: PottedPlantRandom
          amount: 1
    - !type 
      color: "#ab803bff"
      cardinalDecals:
        South: BrickTileWhiteLineS
        East: BrickTileWhiteLineE
        North: BrickTileWhiteLineN
        West: BrickTileWhiteLineW
      cornerDecals:
        SouthEast: BrickTileWhiteCornerSe
        SouthWest: BrickTileWhiteCornerSw
        NorthEast: BrickTileWhiteCornerNe
        NorthWest: BrickTileWhiteCornerNw
      pocketDecals:
        SouthWest: BrickTileWhiteInnerSw
        SouthEast: BrickTileWhiteInnerSe
        NorthWest: BrickTileWhiteInnerNw
        NorthEast: BrickTileWhiteInnerNe
