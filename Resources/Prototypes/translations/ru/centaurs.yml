- # Misfits Change - Centaur NPC mob
# Ported and adapted from DesertRose2/desertrose freaks.dm
# DesertRose: /mob/living/simple_animal/hostile/centaur
# - maxHealth=100, melee_damage=15 (tentacle lash), ranged (neurotoxin spit, damage=30)
# - faction="supermutant" (they spawn in and with super mutant groups)
# - directions: S/N/E/W, 5-frame walk animation
# Sprites: DesertRose2/desertrose freaks.dmi (CC-BY-NC-SA-3.0) - state "centaur" / "centaur_dead"
#MARK: Centaur
type: entity
  name: Centaur
  id: N14MobCentaur
  parent: N14MobBaseHostile
  description: The result of FEV infection gone horribly wrong. A bloated, multi-headed abomination covered in writhing tentacles. Despite their gruesome appearance they frequently travel with super mutant bands.
  # DesertRose: faction=supermutant, ranged neurotoxin spit, melee tentacle lash, retreat_distance=5
  components:
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: N14ToughAnimal
  - type: NpcFactionMember
    factions:
    - SuperMutant
  - type: HTN
    rootTask:
      task: N14RangedHostileCompound
    blackboard:
      NavSmash: !type ':Bool false'
      MeleeRange: !type ':Single 1.5'
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.0
    baseSprintSpeed: 3.5
  - type: Fixtures
    fixtures:
      fix1:
        shape: '!type:PhysShapeCircle radius: 0.40'
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14CentaurAttack #Misfits Change - tentacle lash
    angle: 60
    animation: WeaponArcFist
    damage:
      types:
        Slash: 10
    range: 1.5
  -   # Ranged neurotoxin spit - DesertRose: projectiletype=/obj/item/projectile/neurotox, damage=30
type: Gun
    minAngle: 10
    maxAngle: 30
    angleIncrease: 5
    angleDecay: 8
    fireRate: 0.5
    soundGunshot:
      path: /Audio/_Misfits/Mobs/Centaur/spit.ogg #Misfits Change
    useKey: false
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: BasicEntityAmmoProvider
    proto: N14BulletCentaurSpit
    capacity: 20
    count: 20
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2
  - type: IdleSound #Misfits Change
  - type: SpamEmitSound #Misfits Change
    minInterval: 15
    maxInterval: 60
    sound:
      collection: N14CentaurIdle
      params:
        volume: -6
        maxDistance: 7
  - type: AggroSound #Misfits Change - separate aggro vocalization on combat entry
    sound:
      path: /Audio/_Misfits/Mobs/Centaur/aggro1.ogg
      params:
        volume: -3
        maxDistance: 10
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map:
    - "enum.DamageStateVisualLayers.Base"
      state: alive
      sprite: _Nuclear14/Mobs/Animals/centaur.rsi
  - type: Butcherable
    spawned:
    - id: N14FoodMeatRadRaw
      amount: 3
  - type: LanguageKnowledge # #Misfits Add - understands common wasteland languages; speaks N14Insect (FEV-mutant tentacle sounds)
    speaks:
    - N14Insect
    understands:
    - N14Insect
    - English
    - Chinese
    - Spanish
    - Latin
    - N14Robot
    - N14BrotherBeep
  - type: Body # #Misfits Add - override N14Animal with N14PetAnimal to include heart (Medicine/Poison metabolizer for stimpaks/healing powder)
    prototype: N14PetAnimal
  - type: Hands # #Misfits Add - allows player-controlled centaur pets to drag items
  - type: MisfitsPetNoPickup # #Misfits Add - cancels PickupAttemptEvent; drag only, no item pickup
  - type: PassiveDamage # #Misfits Add - slow natural regeneration for player-controlled pet centaurs
    allowedStates:
    - Alive
    - Critical
    damageCap: 0
    damage:
      groups:
        Brute: '-0.5'
        Burn: '-0.5'
        Toxin: '-0.5'
        Airloss: -3
