# Presets
type: utilityCurvePreset
  id: TargetDistance
  curve: !type
    slope: -1
    exponent: 1
    yOffset: 1
    xOffset: 0
- type: utilityCurvePreset
  id: TargetHealth
  curve: !type
    slope: 1.0
    exponent: 0.4
    xOffset: '-0.02'
